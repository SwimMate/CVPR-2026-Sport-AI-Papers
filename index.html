<script id="paper-data" type="application/json">{"title":"CVPR 2026 Sports AI Paper List","updatedAt":"2026-06-06 21:45 +08","parsedPaperCount":4069,"papers":[{"level":"S","direction":"体育专项","title":"From 3D Pose to Prose: Biomechanics-Grounded Vision-Language Coaching","summary":"BioCoach 将视频外观和 3D 骨架运动学结合起来，生成带有生物力学依据、阶段感和个体化约束的健身动作反馈。","abstractZh":"BioCoach 是一个面向流式视频健身指导的生物力学视觉语言框架，融合视觉外观和 3D 骨架运动学。方法包含运动专项自由度选择、结合个体形态与周期/约束分析的结构化生物力学上下文，以及基于视觉-生物力学条件的反馈生成模块。论文构建 QEVD-bio-fit-coach 数据集和生物力学感知 LLM 评审指标，实验显示显式运动学与约束能提升反馈质量、正确性和阶段感。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_From_3D_Pose_to_Prose_Biomechanics-Grounded_Vision-Language_Coaching_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_From_3D_Pose_to_Prose_Biomechanics-Grounded_Vision-Language_Coaching_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.26938"},{"level":"A","direction":"从动作到物理","title":"Ground Reaction Inertial Poser: Physics-based Human Motion Capture from Sparse IMUs and Insole Pressure Sensors","summary":"GRIP 使用稀疏 IMU 与鞋垫压力传感器，在物理仿真中的数字人体上重建更符合动力学和地面接触的人体运动。","abstractZh":"GRIP 通过四个可穿戴设备重建物理合理的人体运动，将 IMU 信号与足底压力数据结合，以同时捕捉身体动力学和地面交互。方法包含从传感器估计姿态和速度的 KinematicsNet，以及在物理仿真中控制数字人体的 DynamicsNet。论文发布同步 IMU 与鞋垫压力的大规模 PRISM 数据集，实验显示 GRIP 在全局姿态精度和物理一致性上优于 IMU-only 与 IMU-pressure 融合方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Hori_Ground_Reaction_Inertial_Poser_Physics-based_Human_Motion_Capture_from_Sparse_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Hori_Ground_Reaction_Inertial_Poser_Physics-based_Human_Motion_Capture_from_Sparse_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.16233"},{"level":"S","direction":"从视频到姿态","title":"MoCapAnything: Unified 3D Motion Capture for Arbitrary Skeletons from Monocular Videos","summary":"MoCapAnything 将单目视频和任意绑定 3D 资产作为输入，恢复可直接驱动该资产的骨架动画。","abstractZh":"论文提出类别无关动作捕捉 CAMoCap：给定单目视频和任意绑定 3D 资产，恢复能够直接驱动该资产的旋转动画。MoCapAnything 先预测 3D 关节轨迹，再通过约束感知 IK 拟合恢复资产特定旋转；框架包含参考提示编码器、视频特征提取器、统一运动解码器和轻量 IK 阶段。作者构建 Truebones Zoo 数据集，实验显示方法能在域内和野外视频中生成高质量骨架动画，并具备跨物种、异构骨架重定向能力。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Gong_MoCapAnything_Unified_3D_Motion_Capture_for_Arbitrary_Skeletons_from_Monocular_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Gong_MoCapAnything_Unified_3D_Motion_Capture_for_Arbitrary_Skeletons_from_Monocular_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.10881"},{"level":"A","direction":"从视频到姿态","title":"MAMMA: Markerless Accurate Multi-person Motion Acquisition","summary":"MAMMA 通过多视角视频、分割掩码和密集表面 landmark，实现无需 marker 的多人 SMPL-X 动作采集。","abstractZh":"MAMMA 是一个无标记多人动作捕捉流程，可以从多视角视频中准确恢复 SMPL-X 参数。方法预测与接触和可见性相关的密集 2D 表面 landmark，并结合分割掩码，在严重遮挡和身体接触下建立个体对应关系。论文构建包含极端姿态、手部动作和近距离交互的大规模合成多视角数据集，并提出真实多视角评测设置，结果显示其重建质量接近商业 marker-based 系统且减少人工清理。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Velasquez_MAMMA_Markerless_Accurate_Multi-person_Motion_Acquisition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Velasquez_MAMMA_Markerless_Accurate_Multi-person_Motion_Acquisition_CVPR_2026_paper.pdf","arxiv":""},{"level":"A","direction":"体育专项","title":"SoccerMaster: A Vision Foundation Model for Soccer Understanding","summary":"SoccerMaster 通过多任务监督预训练，将球员检测、细粒度感知和事件分类等足球视觉理解任务统一到一个模型中。","abstractZh":"SoccerMaster 是首个足球专项视觉基础模型，目标是用一个统一框架处理从运动员检测到事件分类的多类足球视觉理解任务。作者整合多个足球视频数据集，并提出 SoccerFactory 自动数据整理流程来生成可扩展的多任务训练标注。实验表明 SoccerMaster 在多种下游任务上稳定优于任务专用专家模型，显示专项体育视觉模型具有统一建模价值。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_SoccerMaster_A_Vision_Foundation_Model_for_Soccer_Understanding_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_SoccerMaster_A_Vision_Foundation_Model_for_Soccer_Understanding_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.11016"},{"level":"A","direction":"从视频到姿态","title":"MoBind: Motion Binding for Fine-Grained IMU-Video Pose Alignment","summary":"MoBind 学习 IMU 信号与视频提取的 2D 姿态序列之间的联合表征，用于跨模态检索、同步、定位和动作识别。","abstractZh":"MoBind 是一个层级对比学习框架，用于对齐 IMU 信号和视频中的 2D 姿态序列。方法不直接对齐原始像素，而是将 IMU 与骨架运动序列以及局部身体部位轨迹对齐，以过滤背景、建模多传感器结构并实现亚秒级时间同步。实验覆盖跨模态检索、时间同步、主体/身体部位定位和动作识别四个任务，在 mRi、TotalCapture 和 EgoHumans 上优于强基线。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Nguyen_MoBind_Motion_Binding_for_Fine-Grained_IMU-Video_Pose_Alignment_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Nguyen_MoBind_Motion_Binding_for_Fine-Grained_IMU-Video_Pose_Alignment_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.19004"},{"level":"A","direction":"从视频到姿态","title":"VIMCAN: Visual-Inertial 3D Human Pose Estimation with Hybrid Mamba-Cross-Attention Network","summary":"VIMCAN 将 Mamba 的高效时序建模与 Cross-Attention 的空间依赖建模结合，用于 RGB 关键点和 IMU 数据融合的 3D 人体姿态估计。","abstractZh":"VIMCAN 针对多模态 3D 人体姿态估计中 Transformer 长序列复杂度高的问题，提出结合 Mamba 和 Cross-Attention 的混合结构。Mamba 负责高效时序建模，注意力模块负责跨模态空间依赖抽取，实现 RGB 关键点与可穿戴 IMU 数据的视觉-惯性融合。方法在 TotalCapture 和 3DPW 上达到较低 MPJPE，并能在消费级硬件上超过 60 FPS 实时推理。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_VIMCAN_Visual-Inertial_3D_Human_Pose_Estimation_with_Hybrid_Mamba-Cross-Attention_Network_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_VIMCAN_Visual-Inertial_3D_Human_Pose_Estimation_with_Hybrid_Mamba-Cross-Attention_Network_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.07552"},{"level":"A","direction":"从动作到物理","title":"SIMSPINE: A Biomechanics-Aware Simulation Framework for 3D Spine Motion Annotation and Benchmarking","summary":"SIMSPINE 用肌骨建模为自然全身动作补充解剖一致的 3D 脊柱关键点，并建立视觉生物力学评测基准。","abstractZh":"SIMSPINE 提出一个生物力学感知关键点仿真框架，为现有人体姿态数据集增加由肌骨建模生成、解剖一致的 3D 脊柱关键点。该数据集包含 214 万帧、稀疏椎骨级 3D 脊柱标注，覆盖自然全身动作，并连接肌骨仿真和计算机视觉。论文还发布 2D 检测、单目 3D lifting 和多视角重建基线，建立可复现的生物力学有效脊柱运动估计 benchmark。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Khan_SIMSPINE_A_Biomechanics-Aware_Simulation_Framework_for_3D_Spine_Motion_Annotation_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Khan_SIMSPINE_A_Biomechanics-Aware_Simulation_Framework_for_3D_Spine_Motion_Annotation_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.20792"},{"level":"A","direction":"从物理到 world model","title":"PAI-Bench: A Comprehensive Benchmark For Physical AI","summary":"PAI-Bench 用 2808 个真实世界案例系统评估视频生成、条件视频生成和视频理解模型的物理合理性、预测和推理能力。","abstractZh":"PAI-Bench 是面向 Physical AI 的统一综合 benchmark，评估模型感知与预测真实世界动态的能力。它覆盖视频生成、条件视频生成和视频理解，包含 2808 个真实案例和面向物理合理性、领域推理的指标。研究发现当前视频生成模型虽有较好视觉质量，但常难保持物理一致动态；多模态大模型在预测和因果解释方面也仍然有限。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhou_PAI-Bench_A_Comprehensive_Benchmark_For_Physical_AI_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhou_PAI-Bench_A_Comprehensive_Benchmark_For_Physical_AI_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.01989"},{"level":"A","direction":"4D动态重建","title":"EmbodMocap: In-the-Wild 4D Human-Scene Reconstruction for Embodied Agents","summary":"EmbodMocap 用两台移动 iPhone 共同标定 RGB-D 序列，在统一米制世界坐标中重建野外人体动作和场景几何。","abstractZh":"EmbodMocap 是一种便携、低成本的野外 4D 人体-场景数据采集流程，使用两台移动 iPhone 共同标定双 RGB-D 序列，在统一米制世界坐标下重建人体和场景。该数据支持单目人体-场景重建、基于物理的角色动画和机器人动作控制三类 embodied AI 任务。实验显示该流程能在无静态相机、无 marker 的日常环境中连接人体运动和场景几何。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_EmbodMocap_In-the-Wild_4D_Human-Scene_Reconstruction_for_Embodied_Agents_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_EmbodMocap_In-the-Wild_4D_Human-Scene_Reconstruction_for_Embodied_Agents_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.23205"},{"level":"B","direction":"从动作到物理","title":"IMU-HOI: A Symbiotic Framework for Coherent Human-Object Interaction and Motion Capture via Contact-Conscious Inertial Fusion","summary":"IMU-HOI 从人体和物体上的稀疏 IMU 联合恢复全身人体姿态与物体 6DoF 轨迹，并显式推断手-物接触。","abstractZh":"IMU-HOI 面向人体-物体交互动作捕捉，使用人体和物体上的稀疏 IMU 联合恢复全身姿态和物体 6DoF 轨迹。方法直接从 IMU 流中推断概率性手-物接触，并将接触作为高层信号，在三阶段融合流程中修正人体姿态、root 平移和物体运动。实验显示该框架可提升复杂 HOI 场景中的惯性动作捕捉精度，并能扩展现有 sparse-IMU mocap backbone。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Lin_IMU-HOI_A_Symbiotic_Framework_for_Coherent_Human-Object_Interaction_and_Motion_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Lin_IMU-HOI_A_Symbiotic_Framework_for_Coherent_Human-Object_Interaction_and_Motion_CVPR_2026_paper.pdf","arxiv":""},{"level":"A","direction":"从视频到姿态","title":"FlashCap: Millisecond-Accurate Human Motion Capture via Flashing LEDs and Event-Based Vision","summary":"FlashCap 使用闪烁 LED 与事件视觉构建毫秒级人体动作捕捉系统，并发布包含 event、RGB、LiDAR 和 IMU 的 FlashMotion 数据集。","abstractZh":"FlashCap 关注精确动作时序 PMT，指出毫秒级差异可能决定竞技结果，但现有 HPE 研究缺少高时间分辨率标注数据。论文提出基于闪烁 LED 的动作捕捉系统，采集包含 event、RGB、LiDAR 和 IMU 的 FlashMotion 数据集，并提出 ResPose 基线，用 event 与 RGB 学习残差姿态。实验显示 ResPose 将姿态估计误差降低 40%，并达到毫秒级时序精度。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wu_FlashCap_Millisecond-Accurate_Human_Motion_Capture_via_Flashing_LEDs_and_Event-Based_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wu_FlashCap_Millisecond-Accurate_Human_Motion_Capture_via_Flashing_LEDs_and_Event-Based_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.19770"},{"level":"A","direction":"从视频到姿态","title":"Ultra Diffusion Poser: Diffusion-Based Human Motion Tracking from Sparse Inertial Sensors and Ranging-based Between-sensor Distances","summary":"Ultra Diffusion Poser 将 IMU、UWB 传感器间距离和扩散模型结合，以几何约束提升稀疏惯性人体动作追踪。","abstractZh":"Ultra Diffusion Poser 面向稀疏惯性传感器人体动作追踪，利用 UWB 测距缓解 IMU 漂移。论文不只把 UWB 距离作为输入特征，而是通过 Spatial Layout Module 从距离解析 3D 传感器布局，并在扩散采样中加入 UWB-Diffusion Guidance，促使预测姿态符合实测距离约束。实验显示该方法相较先前工作最多降低 22% 关节位置误差。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Hollidt_Ultra_Diffusion_Poser_Diffusion-Based_Human_Motion_Tracking_from_Sparse_Inertial_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Hollidt_Ultra_Diffusion_Poser_Diffusion-Based_Human_Motion_Tracking_from_Sparse_Inertial_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","direction":"体育专项","title":"MS^2Gait: A Multi-Scale Spatio-Temporal Fusion Network for LiDAR-based Gait Recognition","summary":"MS^2Gait 针对原始点云步态识别，使用多尺度空间依赖建模和相似性驱动的时间增强来提升 LiDAR gait recognition。","abstractZh":"MS^2Gait 面向 3D LiDAR 步态识别，利用 LiDAR 对光照鲁棒、保护隐私和远距离非接触识别的优势。论文指出现有点云方法难以建模跨尺度空间相关和步态时间异质性，因此提出层级空间特征提取与相似性驱动的时间增强 Transformer。方法直接处理原始点云，并在步态识别数据集上提升了多尺度结构恢复和时间聚合能力。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_MS2Gait_A_Multi-Scale_Spatio-Temporal_Fusion_Network_for_LiDAR-based_Gait_Recognition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_MS2Gait_A_Multi-Scale_Spatio-Temporal_Fusion_Network_for_LiDAR-based_Gait_Recognition_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","direction":"体育专项","title":"EventGait: Towards Robust Gait Recognition with Event Streams","summary":"EventGait 用事件相机的微秒级时间分辨率和高动态范围，分别建模步态运动与形状以提升复杂光照下的识别鲁棒性。","abstractZh":"EventGait 探索使用事件相机进行步态识别，以缓解传统相机在非受控环境下受光照和运动影响的问题。方法采用端到端双流框架，动态流用 Mixture of Spiking Experts 建模复杂运动和光照下的动态感知，静态流通过 Cross-modal Structural Alignment 与大视觉模型学习密集形状表征。论文还提出事件步态合成流程并发布 SUSTech1K-E 与 CCGR-Mini-E，实验显示事件步态在低光条件下显著优于普通相机方案。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_EventGait_Towards_Robust_Gait_Recognition_with_Event_Streams_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_EventGait_Towards_Robust_Gait_Recognition_with_Event_Streams_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.22139"},{"level":"S","direction":"从姿态到动作理解","title":"Action Motifs: Self-Supervised Hierarchical Representation of Human Body Movements","summary":"A4Mer 以自监督方式从 3D pose 序列中学习 Action Atoms 和 Action Motifs，形成可复用的人体动作层级表征。","abstractZh":"论文提出由 Action Atoms 和 Action Motifs 组成的人体运动层级表征，前者表示原子级关节运动，后者由时间组合形成并编码跨动作复用的相似身体运动。A4Mer 是一个嵌套 latent Transformer，通过可变长度分段和 masked token prediction 在 pose 数据上自监督学习该表征。作者还发布 AMD 多视角人体行为数据集，带有完整 SMPL 标注；实验显示 learned motifs 能提升动作识别、运动预测和运动插值。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Kinoshita_Action_Motifs_Self-Supervised_Hierarchical_Representation_of_Human_Body_Movements_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Kinoshita_Action_Motifs_Self-Supervised_Hierarchical_Representation_of_Human_Body_Movements_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.28173"},{"level":"A","direction":"从物理到 world model","title":"Chain of World: World Model Thinking in Latent Motion","summary":"CoWVLA 将视频片段分解为结构 latent 和运动 latent，让 VLA 在 latent motion chain 中进行时间因果推理和动作预测。","abstractZh":"Chain of World 指出 VLA 模型常忽略视觉动态背后的预测和时间因果结构，而直接预测未来帧又浪费容量重建背景。CoWVLA 使用预训练视频 VAE 抽取 latent motion，将视频片段显式分解为结构和运动 latent；预训练阶段从指令和初始帧推断连续 latent motion chain 并预测终止帧，随后与离散动作预测联合建模。机器人仿真实验显示该范式优于现有 world-model 和 latent-action 方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_Chain_of_World_World_Model_Thinking_in_Latent_Motion_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_Chain_of_World_World_Model_Thinking_in_Latent_Motion_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.03195"},{"level":"A","direction":"从物理到 world model","title":"GeoWorld: Geometric World Models","summary":"GeoWorld 将能量式预测 world model 的 latent 表征映射到双曲几何空间，以保留状态间的层级和几何关系并改善多步规划。","abstractZh":"GeoWorld 针对能量式预测 world model 在长程视觉规划中的两个问题：latent 通常在欧氏空间学习而忽略几何/层级结构，以及长时预测快速退化。方法通过 Hyperbolic JEPA 将 latent 表征映射到双曲流形，并用 Geometric Reinforcement Learning 在双曲 latent 空间中做能量优化。CrossTask 和 COIN 实验显示其在 3-step 和 4-step planning 上相对 V-JEPA-2 有提升。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhang_GeoWorld_Geometric_World_Models_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhang_GeoWorld_Geometric_World_Models_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.23058"},{"level":"A","direction":"从物理到 world model","title":"VerseCrafter: Dynamic Realistic Video World Model with 4D Geometric Control","summary":"VerseCrafter 用静态背景点云和多物体 3D Gaussian 轨迹组成 4D 几何控制表示，以生成可控的动态真实视频。","abstractZh":"VerseCrafter 是一个几何驱动的视频 world model，目标是从统一 4D 几何世界状态生成动态真实视频。其 4D Geometric Control 表示由静态背景点云和每个物体的 3D Gaussian 轨迹组成，能表达物体运动路径和随时间变化的 3D 占据。方法将该表示渲染为 4D control maps 并输入预训练视频扩散模型；作者还构建 VerseControl4D 数据集，实验显示其相机和多物体运动控制优于先前方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_VerseCrafter_Dynamic_Realistic_Video_World_Model_with_4D_Geometric_Control_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_VerseCrafter_Dynamic_Realistic_Video_World_Model_with_4D_Geometric_Control_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.05138"},{"level":"A","direction":"从物理到 world model","title":"PhysInOne: Visual Physics Learning and Reasoning in One Suite","summary":"PhysInOne 提供 200 万物理视频和完整 3D/语义/运动/物理属性标注，用于训练和评估物理 grounded world models。","abstractZh":"PhysInOne 是一个大规模合成物理数据集，缓解 physically-grounded AI 训练数据稀缺问题。它包含 153,810 个动态 3D 场景、200 万视频，覆盖力学、光学、流体和磁学中的 71 类基础物理现象，并提供 3D 几何、语义、动态运动、物理属性和文本描述标注。实验覆盖物理感知视频生成、未来帧预测、物理属性估计和运动迁移，显示微调基础模型可提升物理合理性，同时暴露复杂物理建模仍有明显缺口。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhou_PhysInOne_Visual_Physics_Learning_and_Reasoning_in_One_Suite_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhou_PhysInOne_Visual_Physics_Learning_and_Reasoning_in_One_Suite_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.09415"},{"level":"A","direction":"从物理到 world model","title":"PhyCritic: Multimodal Critic Models for Physical AI","summary":"PhyCritic 通过两阶段 RLVR 训练面向 Physical AI 的多模态 critic，使模型能评价物理感知、因果推理和规划输出。","abstractZh":"PhyCritic 关注 Physical AI 中开放式评价和偏好对齐所需的 judge/critic 模型。现有 critic 多训练于通用视觉任务，缺少对物理感知、因果推理和规划的评估能力；PhyCritic 通过物理技能 warmup 和 self-referential critic finetuning 两阶段 RLVR 训练，先增强物理推理，再让 critic 生成内部参考以稳定判断。实验显示其在物理和通用多模态 judge benchmark 上优于开源基线。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xiong_PhyCritic_Multimodal_Critic_Models_for_Physical_AI_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xiong_PhyCritic_Multimodal_Critic_Models_for_Physical_AI_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.11124"},{"level":"A","direction":"从动作到物理","title":"InterPrior: Scaling Generative Control for Physics-Based Human-Object Interactions","summary":"InterPrior 通过大规模模仿预训练和强化学习后训练，学习可泛化的物理人体-物体交互生成控制先验。","abstractZh":"InterPrior 面向物理人体-物体交互的生成式控制，认为高层 affordance 可定义目标，而平衡、接触和操作应从底层物理与运动先验中涌现。框架先将全参考模仿专家蒸馏为 goal-conditioned variational policy，再用物理扰动数据增强和强化学习微调，将重建的 latent skills 整合为有效动作流形。结果显示该先验能泛化到未见目标、初始状态和物体，并支持交互式控制和真实机器人部署。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_InterPrior_Scaling_Generative_Control_for_Physics-Based_Human-Object_Interactions_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_InterPrior_Scaling_Generative_Control_for_Physics-Based_Human-Object_Interactions_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.06035"},{"level":"A","direction":"从动作到物理","title":"PAMotion: Physics-Aware Motion Generation for Full-Body Interaction with Multiple Objects","summary":"PAMotion 用物体加速度与接触状态之间的物理关系约束扩散模型，生成多物体全身交互动作。","abstractZh":"PAMotion 是一个物理感知扩散框架，用于生成真实的多物体全身人体交互。论文利用慢速日常场景中的观察：如果物体加速度与重力一致，通常说明无接触；否则说明存在人体或其他物体接触。方法联合建模人体运动、物体运动和加速度，并用 physics-aware interaction loss 约束加速度与接触状态一致；通过粗到细流程先合成 torso 和物体平移，再细化手部动作与物体旋转。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Di_PAMotion_Physics-Aware_Motion_Generation_for_Full-Body_Interaction_with_Multiple_Objects_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Di_PAMotion_Physics-Aware_Motion_Generation_for_Full-Body_Interaction_with_Multiple_Objects_CVPR_2026_paper.pdf","arxiv":""},{"level":"S","direction":"从视频到姿态","title":"RAM: Recover Any 3D Human Motion in-the-Wild","summary":"RAM 面向野外单目视频，实时恢复多人 3D 人体运动，并在遮挡、快速运动和视角变化下保持身份与轨迹连续。","abstractZh":"RAM 解决野外单目视频 3D 人体运动恢复中的遮挡、快速运动和视角变化问题。框架包含带自适应 Kalman filtering 的 motion-aware semantic tracker，用于严重遮挡和动态交互中的身份关联；memory-augmented Temporal HMR 用时空先验增强运动重建；轻量 Predictor 预测未来姿态以维持连续性，并通过 gated combiner 融合重建与预测特征。PoseTrack 和 3DPW 等野外多人 benchmark 实验显示 RAM 在 zero-shot 跟踪稳定性和 3D 精度上优于先前方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Jia_RAM_Recover_Any_3D_Human_Motion_in-the-Wild_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Jia_RAM_Recover_Any_3D_Human_Motion_in-the-Wild_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.19929"},{"level":"A","direction":"4D动态重建","title":"SV-GS: Sparse View 4D Reconstruction with Skeleton-Driven Gaussian Splatting","summary":"SV-GS 在稀疏时间和稀疏视角观测下，借助粗骨架图和 Gaussian Splatting 同时估计动态目标形变和运动。","abstractZh":"SV-GS 针对大范围动态目标的稀疏视角 4D 重建问题，认为现实场景很难获得每个时间点的密集多视角视频。方法以粗骨架图和初始静态重建为引导，同时估计形变模型和目标运动；骨架驱动形变场由粗关节姿态估计器和细粒度形变模块组成，只让关节姿态估计器随时间变化，从而实现平滑运动插值并保留几何细节。实验显示其在稀疏观测下显著优于现有方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Chao_SV-GS_Sparse_View_4D_Reconstruction_with_Skeleton-Driven_Gaussian_Splatting_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Chao_SV-GS_Sparse_View_4D_Reconstruction_with_Skeleton-Driven_Gaussian_Splatting_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.00285"},{"level":"A","direction":"4D动态重建","title":"CARI4D: Category Agnostic 4D Reconstruction of Human-Object Interaction","summary":"CARI4D 从单目 RGB 视频中类别无关地重建人体-物体交互的米制 4D 时空结构，并通过接触推理增强物理一致性。","abstractZh":"CARI4D 是首个从单目 RGB 视频进行类别无关人体-物体交互 4D 重建的方法。它不依赖真实物体模板或固定物体类别，而是通过 pose hypothesis selection 整合 foundation model 的个体预测，并用 learned render-and-compare 范式联合优化空间、时间和像素对齐，最后通过复杂接触推理进一步满足物理约束。实验显示其在域内和未见类别数据上均显著降低重建误差，并可 zero-shot 应用于野外互联网视频。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xie_CARI4D_Category_Agnostic_4D_Reconstruction_of_Human-Object_Interaction_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xie_CARI4D_Category_Agnostic_4D_Reconstruction_of_Human-Object_Interaction_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.11988"},{"level":"B","direction":"4D动态重建","title":"WildPose: A Unified Framework for Robust Pose Estimation in the Wild","summary":"WildPose 是动态环境下的单目相机位姿估计框架，将 feed-forward 感知前端与可微 bundle adjustment 结合以提升 SLAM/SfM 鲁棒性。","abstractZh":"WildPose 处理的是动态环境中的相机位姿估计，而不是人体 pose estimation。论文指出传统视觉 SLAM 和 SfM 多假设静态环境，现有 dynamic-aware 方法又常不统一或对短序列、静态场景不稳。WildPose 结合 feed-forward 模型的感知前端和可微 bundle adjustment，通过冻结的 MASt3R 特征 backbone、3D-aware update operator 和高容量 motion mask detector，在动态、静态和低自运动数据集上均优于先前方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_WildPose_A_Unified_Framework_for_Robust_Pose_Estimation_in_the_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_WildPose_A_Unified_Framework_for_Robust_Pose_Estimation_in_the_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.12774"},{"level":"A","direction":"从姿态到动作理解","title":"Superman: Unifying Skeleton and Vision for Human Motion Perception and Generation","summary":"Superman 用视觉引导的 motion tokenizer 统一骨架与视觉表征，使同一 MLLM 同时支持视频 3D 姿态感知和骨架运动生成。","abstractZh":"Superman 针对人体运动分析中感知模型与生成模型割裂的问题，提出统一视觉感知和骨架时序运动生成的框架。核心是 Vision-Guided Motion Tokenizer，利用 3D 骨架与视觉数据的几何对齐，学习跨模态 motion vocabulary；随后用一个统一 MLLM 处理多种时序输入，覆盖视频 3D 骨架姿态估计、运动预测和 motion in-betweening。Human3.6M 等实验显示其在多个运动任务上达到 SOTA 或竞争性能。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_Superman_Unifying_Skeleton_and_Vision_for_Human_Motion_Perception_and_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_Superman_Unifying_Skeleton_and_Vision_for_Human_Motion_Perception_and_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.02401"},{"level":"B","direction":"体育专项","title":"MMGait: Towards Multi-Modal Gait Recognition","summary":"MMGait 构建包含 RGB、深度、红外、LiDAR 和 4D Radar 的多模态步态 benchmark，并提出统一单模态、跨模态和多模态识别的 OmniGait。","abstractZh":"MMGait 面向远距离、非配合身份识别中的多模态步态问题，指出现有方法多依赖 RGB 派生模态，难以满足真实场景中的跨模态检索和多源协作需求。数据集整合 RGB、深度、红外、LiDAR 和 4D Radar 五类传感器，形成 12 种模态、334,060 个序列和 725 名被试。论文评估单模态、跨模态和多模态范式，并提出 OmniGait 共享嵌入基线。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_MMGait_Towards_Multi-Modal_Gait_Recognition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_MMGait_Towards_Multi-Modal_Gait_Recognition_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.15979"},{"level":"B","direction":"体育专项","title":"HyperGait: Unleashing the Power of Parsing for Gait Recognition in the Wild via Hypergraph","summary":"HyperGait 使用人体 parsing 序列和超图建模身体部位、语义位置与时间动态之间的高阶关系，以提升野外步态识别。","abstractZh":"HyperGait 基于 parsing 序列进行野外步态识别，认为 parsing 比二值轮廓和关键点骨架包含更高信息熵，但现有方法没有充分建模不同位置、语义和时间动态之间的非线性高阶关系。框架包含空间超图卷积模块和时间超图卷积模块，分别提取身体部位间细粒度空间关系和时序相关身体部位间的高阶时间信息。在 Gait3D 和 SUSTech1K 上，HyperGait 仅用 parsing 输入取得较强性能。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_HyperGait_Unleashing_the_Power_of_Parsing_for_Gait_Recognition_in_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_HyperGait_Unleashing_the_Power_of_Parsing_for_Gait_Recognition_in_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","direction":"从姿态到动作理解","title":"Spectral Scalpel: Amplifying Adjacent Action Discrepancy via Frequency-Selective Filtering for Skeleton-Based Action Segmentation","summary":"Spectral Scalpel 通过频率选择性过滤抑制相邻动作共享频率、放大动作特有频率，从而改善骨架动作分割边界。","abstractZh":"Spectral Scalpel 面向 skeleton-based temporal action segmentation，解决相邻动作时空模式区分不足导致的类别混淆和边界模糊。方法使用自适应多尺度谱过滤器编辑频谱，配合相邻动作 discrepancy loss，抑制不同动作之间的共享频率并放大动作特有频率。论文还加入 frequency-aware channel mixer 增强通道演化，在五个公开数据集上达到 SOTA。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_Spectral_Scalpel_Amplifying_Adjacent_Action_Discrepancy_via_Frequency-Selective_Filtering_for_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_Spectral_Scalpel_Amplifying_Adjacent_Action_Discrepancy_via_Frequency-Selective_Filtering_for_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.24134"},{"level":"B","direction":"从姿态到动作理解","title":"PRISM: Learning a Shared Primitive Space for Transferable Skeleton Action Representation","summary":"PRISM 通过 motion generation 学习共享的骨架动作 primitive coefficient space，并将该结构化表征迁移到分类和检测任务。","abstractZh":"PRISM 面向长尾标签、组合动作和视角变化下的人体动作理解，提出以 primitive 为中心的 skeleton modeling 框架。它将动作序列表示为 primitive coefficient space 中的轨迹，用一组原子运动 primitive 的贡献解释观测运动；该表示通过物理 grounded、视角不变的 motion generation 学习，再顺序迁移到分类和逐帧检测任务。实验显示结构化 primitive space 能提升长尾、多标签数据集表现，并支持可解释动作推理。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_PRISM_Learning_a_Shared_Primitive_Space_for_Transferable_Skeleton_Action_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_PRISM_Learning_a_Shared_Primitive_Space_for_Transferable_Skeleton_Action_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","direction":"从姿态到动作理解","title":"LaDy: Lagrangian-Dynamic Informed Network for Skeleton-based Action Segmentation via Spatial-Temporal Modulation","summary":"LaDy 将拉格朗日动力学引入骨架动作分割，用广义力和能量一致性增强相似运动之间的动态区分与边界定位。","abstractZh":"LaDy 针对 skeleton-based temporal action segmentation 中只建模运动学而忽略物理动力学的问题。方法先由关节位置计算广义坐标，再在物理约束下估计拉格朗日项并合成广义力；Energy Consistency Loss 强制动能变化与合力做功一致。学习到的动力学信号通过时空调制模块增强空间语义和时间边界感知，在多个挑战数据集上达到 SOTA。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_LaDy_Lagrangian-Dynamic_Informed_Network_for_Skeleton-based_Action_Segmentation_via_Spatial-Temporal_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_LaDy_Lagrangian-Dynamic_Informed_Network_for_Skeleton-based_Action_Segmentation_via_Spatial-Temporal_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.24097"},{"level":"B","direction":"4D动态重建","title":"MotionCrafter: Dense Geometry and Motion Reconstruction with a 4D VAE","summary":"MotionCrafter 用 4D VAE 联合表示密集 3D 点图和 3D scene flow，从单目视频重建 4D 几何与密集运动。","abstractZh":"MotionCrafter 利用视频生成模型，从单目视频联合重建 4D 几何并估计密集运动。核心表示是在统一坐标系中的密集 3D point maps 与 3D scene flows，并设计专门的 4D VAE 学习该表示。论文指出强行对齐 3D latent 与 RGB VAE latent 没有必要且可能伤害效果，因此提出新的数据归一化与 VAE 训练策略以迁移扩散先验。多数据集实验显示其在几何重建和密集 scene flow 估计上优于现有方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhu_MotionCrafter_Dense_Geometry_and_Motion_Reconstruction_with_a_4D_VAE_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhu_MotionCrafter_Dense_Geometry_and_Motion_Reconstruction_with_a_4D_VAE_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.08961"},{"level":"B","direction":"4D动态重建","title":"Motion 3-to-4: 3D Motion Reconstruction for 4D Synthesis","summary":"Motion 3-to-4 将单目视频中的 4D synthesis 分解为静态 3D 形状生成和运动重建，并预测逐帧顶点轨迹。","abstractZh":"Motion 3-to-4 是一个 feed-forward 框架，从单目视频和可选 3D 参考 mesh 合成高质量 4D 动态对象。方法将 4D synthesis 拆成静态 3D 形状生成和运动重建，利用 canonical reference mesh 学习紧凑 motion latent，并预测每帧顶点轨迹以恢复完整、时间一致的几何。可扩展的逐帧 Transformer 使模型适配不同序列长度，在标准 benchmark 和带真实几何的新数据集上优于先前方法。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Chen_Motion_3-to-4_3D_Motion_Reconstruction_for_4D_Synthesis_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Chen_Motion_3-to-4_3D_Motion_Reconstruction_for_4D_Synthesis_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.14253"},{"level":"B","direction":"4D动态重建","title":"TagSplat: Topology-Aware Gaussian Splatting for Dynamic Mesh Modeling and Tracking","summary":"TagSplat 在 Gaussian Splatting 中显式编码拓扑连接，并通过时间正则和可微 mesh rasterization 重建拓扑一致的动态 mesh 序列。","abstractZh":"TagSplat 解决 4D 重建中高质量、拓扑一致动态 mesh 难以生成的问题。方法提出 Gaussian topological structure 显式编码空间连接，使 densification 和 pruning 具备拓扑感知并保持 Gaussian 表示的流形一致性；时间正则项进一步保证跨时间拓扑连贯，可微 mesh rasterization 改善 mesh 质量。实验显示其重建的 topology-consistent mesh sequences 精度更高，并支持精确 3D keypoint tracking。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Guo_TagSplat_Topology-Aware_Gaussian_Splatting_for_Dynamic_Mesh_Modeling_and_Tracking_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Guo_TagSplat_Topology-Aware_Gaussian_Splatting_for_Dynamic_Mesh_Modeling_and_Tracking_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.01329"},{"level":"B","direction":"从物理到 world model","title":"ProPhy: Progressive Physical Alignment for Dynamic World Simulation","summary":"ProPhy 通过 Mixture-of-Physics-Experts 和渐进物理对齐，让视频 world simulator 更细粒度地响应局部物理线索。","abstractZh":"ProPhy 针对视频生成 world simulator 在大规模或复杂动态中物理一致性不足的问题，认为现有方法对物理 prompt 的响应过于各向同性，忽视生成内容与局部物理线索的细粒度对齐。框架使用两阶段 Mixture-of-Physics-Experts：Semantic Experts 从文本中推断语义级物理原则，Refinement Experts 捕捉 token 级物理动态；同时将 VLM 的物理推理能力迁移到 Refinement Experts。实验显示 ProPhy 生成结果更真实、动态且物理一致。","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_ProPhy_Progressive_Physical_Alignment_for_Dynamic_World_Simulation_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_ProPhy_Progressive_Physical_Alignment_for_Dynamic_World_Simulation_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.05564"}]}</script>
<script>
const htmlEscapeMap={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function e(value){return String(value??'').replace(/[&<>"']/g,ch=>htmlEscapeMap[ch]);}
const data=JSON.parse(document.getElementById('paper-data').textContent);
const papers=data.papers;
const rank={S:0,A:1,B:2};
const rows=document.getElementById('rows');
const search=document.getElementById('search');
const levelFilter=document.getElementById('levelFilter');
const directionFilter=document.getElementById('directionFilter');
const countLine=document.getElementById('countLine');
document.getElementById('metaLine').textContent=papers.length+' papers · updated '+(data.updatedAt||'');
[...new Set(papers.map(p=>p.direction))].forEach(direction=>{const option=document.createElement('option');option.value=direction;option.textContent=direction;directionFilter.appendChild(option);});
function link(label,href){return href?'<a href="'+e(href)+'" target="_blank" rel="noreferrer">'+label+'</a>':'';}
function render(){
  const q=search.value.trim().toLowerCase();
  const level=levelFilter.value;
  const direction=directionFilter.value;
  const filtered=papers
    .filter(p=>(!level||p.level===level)&&(!direction||p.direction===direction))
    .filter(p=>!q||[p.title,p.direction,p.summary,p.abstractZh].join(' ').toLowerCase().includes(q))
    .sort((a,b)=>rank[a.level]-rank[b.level]||a.direction.localeCompare(b.direction,'zh-CN')||a.title.localeCompare(b.title));
  countLine.textContent='显示 '+filtered.length+' / '+papers.length+' 篇';
  rows.innerHTML=filtered.map(p=>'<tr><td><span class="level level-'+e(p.level)+'">'+e(p.level)+'</span></td><td class="direction">'+e(p.direction)+'</td><td class="title">'+e(p.title)+'</td><td>'+e(p.summary)+'</td><td>'+e(p.abstractZh)+'</td><td class="links">'+link('CVF',p.cvf)+link('PDF',p.pdf)+link('arXiv',p.arxiv)+'</td></tr>').join('');
}
[search,levelFilter,directionFilter].forEach(el=>el.addEventListener('input',render));
render();
</script>
</body>
</html>

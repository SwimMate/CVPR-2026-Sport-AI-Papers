ely, all without any post-optimization.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhu_MotionCrafter_Dense_Geometry_and_Motion_Reconstruction_with_a_4D_VAE_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhu_MotionCrafter_Dense_Geometry_and_Motion_Reconstruction_with_a_4D_VAE_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.08961"},{"level":"B","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"Motion 3-to-4: 3D Motion Reconstruction for 4D Synthesis","summaryZh":"Motion 3-to-4 将单目视频中的 4D synthesis 分解为静态 3D 形状生成和运动重建，并预测逐帧顶点轨迹。","summaryEn":"Motion 3-to-4 decomposes 4D synthesis into static 3D shape generation and motion reconstruction from monocular video.","abstractZh":"Motion 3-to-4 是一个 feed-forward 框架，从单目视频和可选 3D 参考 mesh 合成高质量 4D 动态对象。方法将 4D synthesis 拆成静态 3D 形状生成和运动重建，利用 canonical reference mesh 学习紧凑 motion latent，并预测每帧顶点轨迹以恢复完整、时间一致的几何。可扩展的逐帧 Transformer 使模型适配不同序列长度，在标准 benchmark 和带真实几何的新数据集上优于先前方法。","abstractEn":"We present Motion 3-to-4, a feed-forward framework for synthesising high-quality 4D dynamic objects from a single monocular video and an optional 3D reference mesh. While recent advances have significantly improved 2D, video, and 3D content generation, 4D synthesis remains difficult due to limited training data and the inherent ambiguity of recovering geometry and motion from a monocular viewpoint. Motion 3-to-4 addresses these challenges by decomposing 4D synthesis into static 3D shape generation and motion reconstruction. Using a canonical reference mesh, our model learns a compact motion latent representation and predicts per-frame vertex trajectories to recover complete, temporally coherent geometry. A scalable frame-wise transformer further enables robustness to varying sequence lengths. Evaluations on both standard benchmarks and a new dataset with accurate ground-truth geometry show that Motion 3-to-4 delivers superior fidelity and spatial consistency compared to prior work. Project page is available at https://motion3-to-4.github.io/.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Chen_Motion_3-to-4_3D_Motion_Reconstruction_for_4D_Synthesis_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Chen_Motion_3-to-4_3D_Motion_Reconstruction_for_4D_Synthesis_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.14253"},{"level":"B","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"TagSplat: Topology-Aware Gaussian Splatting for Dynamic Mesh Modeling and Tracking","summaryZh":"TagSplat 在 Gaussian Splatting 中显式编码拓扑连接，并通过时间正则和可微 mesh rasterization 重建拓扑一致的动态 mesh 序列。","summaryEn":"TagSplat encodes topology in Gaussian Splatting to reconstruct topology-consistent dynamic mesh sequences.","abstractZh":"TagSplat 解决 4D 重建中高质量、拓扑一致动态 mesh 难以生成的问题。方法提出 Gaussian topological structure 显式编码空间连接，使 densification 和 pruning 具备拓扑感知并保持 Gaussian 表示的流形一致性；时间正则项进一步保证跨时间拓扑连贯，可微 mesh rasterization 改善 mesh 质量。实验显示其重建的 topology-consistent mesh sequences 精度更高，并支持精确 3D keypoint tracking。","abstractEn":"Topology-consistent dynamic model sequences are essential for applications such as animation and model editing. However, existing 4D reconstruction methods face challenges in generating high-quality topology-consistent meshes. To address this, we propose a topology-aware dynamic reconstruction framework based on Gaussian Splatting. We introduce a Gaussian topological structure that explicitly encodes spatial connectivity. This structure enables topology-aware densification and pruning, preserving the manifold consistency of the Gaussian representation. Temporal regularization terms further ensure topological coherence over time, while differentiable mesh rasterization improves mesh quality. Experimental results demonstrate that our method reconstructs topology-consistent mesh sequences with significantly higher accuracy than existing approaches. Moreover, the resulting meshes enable precise 3D keypoint tracking.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Guo_TagSplat_Topology-Aware_Gaussian_Splatting_for_Dynamic_Mesh_Modeling_and_Tracking_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Guo_TagSplat_Topology-Aware_Gaussian_Splatting_for_Dynamic_Mesh_Modeling_and_Tracking_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.01329"},{"level":"B","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"ProPhy: Progressive Physical Alignment for Dynamic World Simulation","summaryZh":"ProPhy 通过 Mixture-of-Physics-Experts 和渐进物理对齐，让视频 world simulator 更细粒度地响应局部物理线索。","summaryEn":"ProPhy improves physical consistency in dynamic video world simulation through progressive physical alignment.","abstractZh":"ProPhy 针对视频生成 world simulator 在大规模或复杂动态中物理一致性不足的问题，认为现有方法对物理 prompt 的响应过于各向同性，忽视生成内容与局部物理线索的细粒度对齐。框架使用两阶段 Mixture-of-Physics-Experts：Semantic Experts 从文本中推断语义级物理原则，Refinement Experts 捕捉 token 级物理动态；同时将 VLM 的物理推理能力迁移到 Refinement Experts。实验显示 ProPhy 生成结果更真实、动态且物理一致。","abstractEn":"Recent advances in video generation have shown remarkable potential for constructing world simulators. However, current models still struggle to produce physically consistent results, particularly when handling large-scale or complex dynamics. This limitation arises primarily because existing approaches respond isotropically to physical prompts and neglect the fine-grained alignment between generated content and localized physical cues. To address these challenges, we propose ProPhy, a Progressive Physical Alignment Framework that enables explicit physics-aware conditioning and anisotropic generation. ProPhy employs a two-stage Mixture-of-Physics-Experts (MoPE) mechanism for discriminative physical prior extraction, where Semantic Experts infer semantic-level physical principles from textual descriptions, and Refinement Experts capture token-level physical dynamics. This mechanism allows the model to learn fine-grained, physics-aware video representations that better reflect underlying physical laws. Furthermore, we introduce a physical alignment strategy that transfers the physical reasoning capabilities of vision-language models (VLMs) into the Refinement Experts, facilitating a more accurate representation of dynamic physical phenomena. Extensive experiments on physics-aware video generation benchmarks demonstrate that ProPhy produces more realistic, dynamic, and physically coherent results than existing state-of-the-art methods.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_ProPhy_Progressive_Physical_Alignment_for_Dynamic_World_Simulation_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_ProPhy_Progressive_Physical_Alignment_for_Dynamic_World_Simulation_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.05564"}]}</script>
<script>
const htmlEscapeMap={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};
function e(value){return String(value??'').replace(/[&<>"']/g,ch=>htmlEscapeMap[ch]);}
const copy={
  en:{htmlLang:'en',title:'CVPR 2026 Sports AI Paper List',subtitle:'Curated papers related to sports AI, motion capture, pose, biomechanics, physical AI, and motion understanding.',search:'Search title, direction, summary, abstract',allLevels:'All levels',allDirections:'All directions',level:'Level',direction:'Direction',paper:'Paper',summary:'One-line summary',abstract:'Abstract',links:'Links',showing:'Showing',papers:'papers',updated:'updated'},
  zh:{htmlLang:'zh-CN',title:'CVPR 2026 体育 AI 论文表',subtitle:'整理和体育 AI、动作捕捉、姿态估计、生物力学、Physical AI、动作理解相关的 CVPR 2026 论文。',search:'搜索标题、方向、总结、摘要',allLevels:'全部等级',allDirections:'全部方向',level:'等级',direction:'方向',paper:'论文',summary:'一句话总结',abstract:'摘要',links:'链接',showing:'显示',papers:'篇',updated:'更新'}
};
const data=JSON.parse(document.getElementById('paper-data').textContent);
const papers=data.papers;
const rank={S:0,A:1,B:2};
const rows=document.getElementById('rows');
const search=document.getElementById('search');
const levelFilter=document.getElementById('levelFilter');
const directionFilter=document.getElementById('directionFilter');
const countLine=document.getElementById('countLine');
const enBtn=document.getElementById('enBtn');
const zhBtn=document.getElementById('zhBtn');
let lang='en';
function getDirection(p){return lang==='en'?p.directionEn:p.directionZh;}
function getSummary(p){return lang==='en'?p.summaryEn:p.summaryZh;}
function getAbstract(p){return lang==='en'?p.abstractEn:p.abstractZh;}
function link(label,href){return href?'<a href="'+e(href)+'" target="_blank" rel="noreferrer">'+label+'</a>':'';}
function populateFilters(){
  const currentLevel=levelFilter.value;
  const currentDirection=directionFilter.value;
  const c=copy[lang];
  levelFilter.innerHTML='<option value="">'+c.allLevels+'</option><option value="S">S</option><option value="A">A</option><option value="B">B</option>';
  levelFilter.value=currentLevel;
  const directions=[...new Set(papers.map(getDirection))];
  directionFilter.innerHTML='<option value="">'+c.allDirections+'</option>'+directions.map(d=>'<option value="'+e(d)+'">'+e(d)+'</option>').join('');
  directionFilter.value=directions.includes(currentDirection)?currentDirection:'';
}
function applyCopy(){
  const c=copy[lang];
  document.documentElement.lang=c.htmlLang;
  document.getElementById('pageTitle').textContent=c.title;
  document.getElementById('subtitle').textContent=c.subtitle;
  document.getElementById('metaLine').textContent=papers.length+' '+c.papers+' · '+c.updated+' '+(data.updatedAt||'');
  search.placeholder=c.search;
  document.getElementById('thLevel').textContent=c.level;
  document.getElementById('thDirection').textContent=c.direction;
  document.getElementById('thPaper').textContent=c.paper;
  document.getElementById('thSummary').textContent=c.summary;
  document.getElementById('thAbstract').textContent=c.abstract;
  document.getElementById('thLinks').textContent=c.links;
  enBtn.classList.toggle('active',lang==='en');
  zhBtn.classList.toggle('active',lang==='zh');
  populateFilters();
}
function render(){
  const c=copy[lang];
  const q=search.value.trim().toLowerCase();
  const level=levelFilter.value;
  const direction=directionFilter.value;
  const filtered=papers
    .filter(p=>(!level||p.level===level)&&(!direction||getDirection(p)===direction))
    .filter(p=>!q||[p.title,getDirection(p),getSummary(p),getAbstract(p)].join(' ').toLowerCase().includes(q))
    .sort((a,b)=>rank[a.level]-rank[b.level]||getDirection(a).localeCompare(getDirection(b),lang==='zh'?'zh-CN':'en')||a.title.localeCompare(b.title));
  countLine.textContent=c.showing+' '+filtered.length+' / '+papers.length+' '+c.papers;
  rows.innerHTML=filtered.map(p=>'<tr><td><span class="level level-'+e(p.level)+'">'+e(p.level)+'</span></td><td class="direction">'+e(getDirection(p))+'</td><td class="title">'+e(p.title)+'</td><td>'+e(getSummary(p))+'</td><td>'+e(getAbstract(p))+'</td><td class="links">'+link('CVF',p.cvf)+link('PDF',p.pdf)+link('arXiv',p.arxiv)+'</td></tr>').join('');
}
function setLang(next){lang=next;applyCopy();render();}
enBtn.addEventListener('click',()=>setLang('en'));
zhBtn.addEventListener('click',()=>setLang('zh'));
[search,levelFilter,directionFilter].forEach(el=>el.addEventListener('input',render));
setLang('en');
</script>
</body>
</html>

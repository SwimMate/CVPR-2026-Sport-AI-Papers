<script id="paper-data" type="application/json">{"updatedAt":"2026-06-06 21:45 +08","parsedPaperCount":4069,"papers":[{"level":"S","directionZh":"体育专项","directionEn":"Sports-specific","title":"From 3D Pose to Prose: Biomechanics-Grounded Vision-Language Coaching","summaryZh":"BioCoach 将视频外观和 3D 骨架运动学结合起来，生成带有生物力学依据、阶段感和个体化约束的健身动作反馈。","summaryEn":"BioCoach combines visual appearance and 3D skeletal kinematics to generate biomechanics-grounded coaching feedback.","abstractZh":"BioCoach 是一个面向流式视频健身指导的生物力学视觉语言框架，融合视觉外观和 3D 骨架运动学。方法包含运动专项自由度选择、结合个体形态与周期/约束分析的结构化生物力学上下文，以及基于视觉-生物力学条件的反馈生成模块。论文构建 QEVD-bio-fit-coach 数据集和生物力学感知 LLM 评审指标，实验显示显式运动学与约束能提升反馈质量、正确性和阶段感。","abstractEn":"We present BioCoach, a biomechanics-grounded vision-language framework for fitness coaching from streaming video. BioCoach fuses two signals, visual appearance and 3D skeletal kinematics, through a novel three-stage pipeline: an exercise-specific degree-of-freedom selector that focuses analysis on salient joints; a structured biomechanical context that pairs individualized morphometrics with cycle and constraint analysis; and a vision-biomechanics conditioned feedback module that applies cross-attention to generate precise, actionable text. Using parameter-efficient training that freezes the vision and language backbones, BioCoach yields transparent, personalized reasoning rather than pattern matching. To enable learning and fair evaluation, we augment QEVD-fit-coach with biomechanics-oriented feedback to create QEVD-bio-fit-coach, and we introduce a biomechanics-aware LLM judge metric. BioCoach delivers clear gains on QEVD-bio-fit-coach across lexical and judgment metrics while maintaining temporal triggering; on the original QEVD-fit-coach, it improves text quality and correctness with near-parity timing, demonstrating that explicit kinematics and constraints are key to accurate, phase-aware coaching.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_From_3D_Pose_to_Prose_Biomechanics-Grounded_Vision-Language_Coaching_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_From_3D_Pose_to_Prose_Biomechanics-Grounded_Vision-Language_Coaching_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.26938"},{"level":"A","directionZh":"从动作到物理","directionEn":"Motion to physics","title":"Ground Reaction Inertial Poser: Physics-based Human Motion Capture from Sparse IMUs and Insole Pressure Sensors","summaryZh":"GRIP 使用稀疏 IMU 与鞋垫压力传感器，在物理仿真中的数字人体上重建更符合动力学和地面接触的人体运动。","summaryEn":"GRIP combines sparse IMUs and insole pressure sensors to reconstruct physically plausible human motion with ground-contact dynamics.","abstractZh":"GRIP 通过四个可穿戴设备重建物理合理的人体运动，将 IMU 信号与足底压力数据结合，以同时捕捉身体动力学和地面交互。方法包含从传感器估计姿态和速度的 KinematicsNet，以及在物理仿真中控制数字人体的 DynamicsNet。论文发布同步 IMU 与鞋垫压力的大规模 PRISM 数据集，实验显示 GRIP 在全局姿态精度和物理一致性上优于 IMU-only 与 IMU-pressure 融合方法。","abstractEn":"We propose Ground Reaction Inertial Poser (GRIP), a method that reconstructs physically plausible human motion using four wearable devices. Unlike conventional IMU-only approaches, GRIP combines IMU signals with foot pressure data to capture both body dynamics and ground interactions. Furthermore, rather than relying solely on kinematic estimation, GRIP uses a digital twin of a person, in the form of a synthetic humanoid in a physics simulator, to reconstruct realistic and physically plausible motion. At its core, GRIP consists of two modules: KinematicsNet, which estimates body poses and velocities from sensor data, and DynamicsNet, which controls the humanoid in the simulator using the residual between the KinematicsNet prediction and the simulated humanoid state. To enable robust training and fair evaluation, we introduce a large-scale dataset, Pressure and Inertial Sensing for Human Motion and Interaction (PRISM), that captures diverse human motions with synchronized IMUs and insole pressure sensors. Experimental results show that GRIP outperforms existing IMU-only and IMU-pressure fusion methods across all evaluated datasets, achieving higher global pose accuracy and improved physical consistency.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Hori_Ground_Reaction_Inertial_Poser_Physics-based_Human_Motion_Capture_from_Sparse_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Hori_Ground_Reaction_Inertial_Poser_Physics-based_Human_Motion_Capture_from_Sparse_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.16233"},{"level":"S","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"MoCapAnything: Unified 3D Motion Capture for Arbitrary Skeletons from Monocular Videos","summaryZh":"MoCapAnything 将单目视频和任意绑定 3D 资产作为输入，恢复可直接驱动该资产的骨架动画。","summaryEn":"MoCapAnything recovers asset-specific skeletal animation from monocular video and an arbitrary rigged 3D asset prompt.","abstractZh":"论文提出类别无关动作捕捉 CAMoCap：给定单目视频和任意绑定 3D 资产，恢复能够直接驱动该资产的旋转动画。MoCapAnything 先预测 3D 关节轨迹，再通过约束感知 IK 拟合恢复资产特定旋转；框架包含参考提示编码器、视频特征提取器、统一运动解码器和轻量 IK 阶段。作者构建 Truebones Zoo 数据集，实验显示方法能在域内和野外视频中生成高质量骨架动画，并具备跨物种、异构骨架重定向能力。","abstractEn":"Motion capture now underpins content creation far beyond digital humans, yet most pipelines remain species- or template-specific. We formalize this gap as Category-Agnostic Motion Capture (CAMoCap): given a monocular video and an arbitrary rigged 3D asset as a prompt, the goal is to reconstruct a rotation-based animation (e.g., BVH) that directly drives the specific asset. We present MoCapAnything, a reference-guided, factorized framework that first predicts 3D joint trajectories and then recovers asset-specific rotations via constraint-aware Inverse Kinematics (IK) Fitting. MoCapAnything comprises three learnable modules and a lightweight IK stage: a Reference Prompt Encoder that distills per-joint queries from the asset's skeleton, mesh, and rendered image set; a Video Feature Extractor that computes dense visual descriptors and reconstructs a coarse 4D deforming mesh to bridge the modality gap between RGB tokens and the point-cloud-like joint space; and a Unified Motion Decoder that fuses these cues to produce temporally coherent trajectories. We also curate Truebones Zoo with 1,038 motion clips, each providing a standardized skeleton-mesh-rendered-video triad. Experiments on in-domain benchmarks and in-the-wild videos show that MoCapAnything delivers high-quality skeletal animations and exhibits non-trivial cross-species retargeting across heterogeneous rigs, offering a scalable path toward prompt-based 3D motion capture for arbitrary assets. The codes are available on our project page: https://animotionlab.github.io/MoCapAnything/","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Gong_MoCapAnything_Unified_3D_Motion_Capture_for_Arbitrary_Skeletons_from_Monocular_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Gong_MoCapAnything_Unified_3D_Motion_Capture_for_Arbitrary_Skeletons_from_Monocular_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.10881"},{"level":"A","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"MAMMA: Markerless Accurate Multi-person Motion Acquisition","summaryZh":"MAMMA 通过多视角视频、分割掩码和密集表面 landmark，实现无需 marker 的多人 SMPL-X 动作采集。","summaryEn":"MAMMA performs markerless multi-person SMPL-X motion capture from multi-view video using dense surface landmarks.","abstractZh":"MAMMA 是一个无标记多人动作捕捉流程，可以从多视角视频中准确恢复 SMPL-X 参数。方法预测与接触和可见性相关的密集 2D 表面 landmark，并结合分割掩码，在严重遮挡和身体接触下建立个体对应关系。论文构建包含极端姿态、手部动作和近距离交互的大规模合成多视角数据集，并提出真实多视角评测设置，结果显示其重建质量接近商业 marker-based 系统且减少人工清理。","abstractEn":"We present MAMMA, a markerless motion-capture pipeline that accurately recovers SMPL-X parameters from multi-view video. Traditional motion-capture systems rely on physical markers. Although they offer high accuracy, their requirements of specialized hardware, manual marker placement, and extensive post-processing make them costly and time-consuming. Recent learning-based methods attempt to overcome these limitations, but most are designed for single-person capture, rely on sparse keypoints, or struggle with occlusions and physical interactions. In this work, we introduce a method that predicts dense 2D contact-aware and visibility-aware surface landmarks conditioned on segmentation masks, enabling person-specific correspondence estimation even under heavy occlusion. We employ a novel architecture that exploits learnable queries for each landmark. We demonstrate that our approach can handle complex person--person interaction and offers greater accuracy than existing methods. To train our network, we construct a large, synthetic multi-view dataset combining human motions from diverse sources, including extreme poses, hand motions, and close interactions. Our dataset yields high-variability synthetic sequences with rich body contact and occlusion, and includes SMPL-X ground-truth annotations with dense 2D landmarks. The result is a system capable of accurately capturing human motion without the need for markers. Our approach offers competitive reconstruction quality compared to commercial marker-based motion-capture solutions, without the extensive manual cleanup. Finally, we address the absence of common benchmarks for dense-landmark prediction and markerless motion capture by introducing two evaluation settings built from real multi-view sequences. https://mamma.is.tue.mpg.de/","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Velasquez_MAMMA_Markerless_Accurate_Multi-person_Motion_Acquisition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Velasquez_MAMMA_Markerless_Accurate_Multi-person_Motion_Acquisition_CVPR_2026_paper.pdf","arxiv":""},{"level":"A","directionZh":"体育专项","directionEn":"Sports-specific","title":"SoccerMaster: A Vision Foundation Model for Soccer Understanding","summaryZh":"SoccerMaster 通过多任务监督预训练，将球员检测、细粒度感知和事件分类等足球视觉理解任务统一到一个模型中。","summaryEn":"SoccerMaster unifies soccer visual understanding tasks through supervised multi-task pretraining and curated soccer video data.","abstractZh":"SoccerMaster 是首个足球专项视觉基础模型，目标是用一个统一框架处理从运动员检测到事件分类的多类足球视觉理解任务。作者整合多个足球视频数据集，并提出 SoccerFactory 自动数据整理流程来生成可扩展的多任务训练标注。实验表明 SoccerMaster 在多种下游任务上稳定优于任务专用专家模型，显示专项体育视觉模型具有统一建模价值。","abstractEn":"Soccer understanding has recently garnered growing research interest due to its domain-specific complexity and unique challenges.However, prior works typically rely on task-specific expert models, which are resource-intensive and hinder a holistic view of the game.This paper aims to propose a unified framework that enables a single model to handle diverse soccer visual understanding tasks, spanning both fine-grained perception (e.g., athlete detection) and semantic reasoning (e.g., event classification).Concretely, we make the following contributions in this paper:(i) we present **SoccerMaster**, the first soccer-specific vision foundation model that unifies comprehensive understanding tasks within a single framework via **supervised multi-task pretraining**;(ii) we consolidate multiple existing soccer video datasets and develop an automated data curation pipeline, termed as **SoccerFactory**, to produce scalable multi-task training annotations;and (iii) we conduct extensive experiments demonstrating that SoccerMaster consistently outperforms task-specific expert models across diverse downstream tasks, underscoring its breadth and superiority.The data, code, and model will be publicly available to the research community.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_SoccerMaster_A_Vision_Foundation_Model_for_Soccer_Understanding_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_SoccerMaster_A_Vision_Foundation_Model_for_Soccer_Understanding_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.11016"},{"level":"A","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"MoBind: Motion Binding for Fine-Grained IMU-Video Pose Alignment","summaryZh":"MoBind 学习 IMU 信号与视频提取的 2D 姿态序列之间的联合表征，用于跨模态检索、同步、定位和动作识别。","summaryEn":"MoBind learns a shared representation between IMU signals and video-derived 2D pose sequences for fine-grained alignment.","abstractZh":"MoBind 是一个层级对比学习框架，用于对齐 IMU 信号和视频中的 2D 姿态序列。方法不直接对齐原始像素，而是将 IMU 与骨架运动序列以及局部身体部位轨迹对齐，以过滤背景、建模多传感器结构并实现亚秒级时间同步。实验覆盖跨模态检索、时间同步、主体/身体部位定位和动作识别四个任务，在 mRi、TotalCapture 和 EgoHumans 上优于强基线。","abstractEn":"We aim to learn a joint representation between inertial measurement unit (IMU) signals and 2D pose sequences extracted from video, enabling accurate cross-modal retrieval, temporal synchronization, subject and body-part localization, and action recognition. To this end, we introduce MoBind, a hierarchical contrastive learning framework designed to address three challenges: (1) filtering out irrelevant visual background, (2) modeling structured multi-sensor IMU configurations, and (3) achieving fine-grained, sub-second temporal alignment. To isolate motion-relevant cues, MoBind aligns IMU signals with skeletal motion sequences rather than raw pixels. We further decompose full-body motion into local body-part trajectories, pairing each with its corresponding IMU to enable semantically grounded multi-sensor alignment. To capture detailed temporal correspondence, MoBind employs a hierarchical contrastive strategy that first aligns token-level temporal segments, then fuses local (body-part) alignment with global (body-wide) motion aggregation. Evaluated on mRi, TotalCapture, and EgoHumans, MoBind consistently outperforms strong baselines across all four tasks, demonstrating robust fine-grained temporal alignment while preserving coarse semantic consistency across modalities.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Nguyen_MoBind_Motion_Binding_for_Fine-Grained_IMU-Video_Pose_Alignment_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Nguyen_MoBind_Motion_Binding_for_Fine-Grained_IMU-Video_Pose_Alignment_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.19004"},{"level":"A","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"VIMCAN: Visual-Inertial 3D Human Pose Estimation with Hybrid Mamba-Cross-Attention Network","summaryZh":"VIMCAN 将 Mamba 的高效时序建模与 Cross-Attention 的空间依赖建模结合，用于 RGB 关键点和 IMU 数据融合的 3D 人体姿态估计。","summaryEn":"VIMCAN fuses RGB keypoints and wearable IMU data with a hybrid Mamba and cross-attention architecture for 3D human pose estimation.","abstractZh":"VIMCAN 针对多模态 3D 人体姿态估计中 Transformer 长序列复杂度高的问题，提出结合 Mamba 和 Cross-Attention 的混合结构。Mamba 负责高效时序建模，注意力模块负责跨模态空间依赖抽取，实现 RGB 关键点与可穿戴 IMU 数据的视觉-惯性融合。方法在 TotalCapture 和 3DPW 上达到较低 MPJPE，并能在消费级硬件上超过 60 FPS 实时推理。","abstractEn":"The rapid advances in deep learning have significantly enhanced the accuracy of multimodal 3D human pose estimation (HPE). However, the state-of-the-art (SOTA) HPE pipelines still rely on Transformers, whose quadratic complexity makes real-time processing for long sequences impractical. Mamba addresses this issue through selective state-space modeling, enabling efficient sequence processing without sacrificing representational power. Nevertheless, it struggles to capture complex spatial dependencies in multimodal settings. To bridge this gap, we propose VIMCAN, a hybrid architecture that combines the efficient sequence modeling of Mamba with the spatial reasoning of Cross-Attention, and performs robust visual-inertial fusion and human pose estimation between RGB keypoints and wearable IMU data. By leveraging Mamba's dynamic parameterization for temporal modeling and Attention for spatial dependency extraction, VIMCAN achieves superior accuracy, with mean per-joint position errors (MPJPE) of 17.2 mm on TotalCapture and 45.3 mm on 3DPW. VIMCAN outperforms prior Transformer-based and other SOTA approaches while supporting real-time inference at over 60 frames per second on consumer-grade hardware. The source code will be available on GitHub.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_VIMCAN_Visual-Inertial_3D_Human_Pose_Estimation_with_Hybrid_Mamba-Cross-Attention_Network_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_VIMCAN_Visual-Inertial_3D_Human_Pose_Estimation_with_Hybrid_Mamba-Cross-Attention_Network_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.07552"},{"level":"A","directionZh":"从动作到物理","directionEn":"Motion to physics","title":"SIMSPINE: A Biomechanics-Aware Simulation Framework for 3D Spine Motion Annotation and Benchmarking","summaryZh":"SIMSPINE 用肌骨建模为自然全身动作补充解剖一致的 3D 脊柱关键点，并建立视觉生物力学评测基准。","summaryEn":"SIMSPINE uses musculoskeletal modeling to add anatomically consistent 3D spine keypoints to natural full-body motion data.","abstractZh":"SIMSPINE 提出一个生物力学感知关键点仿真框架，为现有人体姿态数据集增加由肌骨建模生成、解剖一致的 3D 脊柱关键点。该数据集包含 214 万帧、稀疏椎骨级 3D 脊柱标注，覆盖自然全身动作，并连接肌骨仿真和计算机视觉。论文还发布 2D 检测、单目 3D lifting 和多视角重建基线，建立可复现的生物力学有效脊柱运动估计 benchmark。","abstractEn":"Modeling spinal motion is fundamental to understanding human biomechanics, yet remains underexplored in computer vision due to the spine's complex multi-joint kinematics and the lack of large-scale 3D annotations. We present a biomechanics-aware keypoint simulation framework that augments existing human pose datasets with anatomically consistent 3D spinal keypoints derived from musculoskeletal modeling. Using this framework, we create the first open dataset, named SIMSPINE, which provides sparse vertebra-level 3D spinal annotations for natural full-body motions in indoor multi-camera capture without external restraints. With 2.14 million frames, this enables data-driven learning of vertebral kinematics from subtle posture variations and bridges the gap between musculoskeletal simulation and computer vision. In addition, we release pretrained baselines covering fine-tuned 2D detectors, monocular 3D pose lifting models, and multi-view reconstruction pipelines, establishing a unified benchmark for biomechanically valid spine motion estimation. Specifically, our 2D spine baselines improve the state-of-the-art from 0.63 to 0.80 AUC in controlled environments, and from 0.91 to 0.93 AP for in-the-wild spine tracking.Together, the simulation framework and SIMSPINE dataset advance research in vision-based biomechanics, motion analysis, and digital human modeling by enabling reproducible, anatomically grounded 3D spine estimation under natural conditions.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Khan_SIMSPINE_A_Biomechanics-Aware_Simulation_Framework_for_3D_Spine_Motion_Annotation_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Khan_SIMSPINE_A_Biomechanics-Aware_Simulation_Framework_for_3D_Spine_Motion_Annotation_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.20792"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"PAI-Bench: A Comprehensive Benchmark For Physical AI","summaryZh":"PAI-Bench 用 2808 个真实世界案例系统评估视频生成、条件视频生成和视频理解模型的物理合理性、预测和推理能力。","summaryEn":"PAI-Bench evaluates physical plausibility, prediction, and reasoning across video generation and multimodal understanding tasks.","abstractZh":"PAI-Bench 是面向 Physical AI 的统一综合 benchmark，评估模型感知与预测真实世界动态的能力。它覆盖视频生成、条件视频生成和视频理解，包含 2808 个真实案例和面向物理合理性、领域推理的指标。研究发现当前视频生成模型虽有较好视觉质量，但常难保持物理一致动态；多模态大模型在预测和因果解释方面也仍然有限。","abstractEn":"Physical AI aims to develop models that can perceive and predict real-world dynamics; yet, the extent to which current multi-modal large language models and video generative models support these abilities is insufficiently understood. We introduce Physical AI Bench (PAI-Bench), a unified and comprehensive benchmark that evaluates perception and prediction capabilities across video generation, conditional video generation, and video understanding, comprising 2,808 real-world cases with task-aligned metrics designed to capture physical plausibility and domain-specific reasoning. Our study provides a systematic assessment of recent models and shows that video generative models, despite strong visual fidelity, often struggle to maintain physically coherent dynamics, while multi-modal large language models exhibit limited performance in forecasting and causal interpretation. These observations suggest that current systems are still at an early stage in handling the perceptual and predictive demands of Physical AI. In summary, PAI-Bench establishes a realistic foundation for evaluating Physical AI and highlights key gaps that future systems must address.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhou_PAI-Bench_A_Comprehensive_Benchmark_For_Physical_AI_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhou_PAI-Bench_A_Comprehensive_Benchmark_For_Physical_AI_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.01989"},{"level":"A","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"EmbodMocap: In-the-Wild 4D Human-Scene Reconstruction for Embodied Agents","summaryZh":"EmbodMocap 用两台移动 iPhone 共同标定 RGB-D 序列，在统一米制世界坐标中重建野外人体动作和场景几何。","summaryEn":"EmbodMocap reconstructs humans and scenes in a unified metric 4D world frame using two moving iPhones.","abstractZh":"EmbodMocap 是一种便携、低成本的野外 4D 人体-场景数据采集流程，使用两台移动 iPhone 共同标定双 RGB-D 序列，在统一米制世界坐标下重建人体和场景。该数据支持单目人体-场景重建、基于物理的角色动画和机器人动作控制三类 embodied AI 任务。实验显示该流程能在无静态相机、无 marker 的日常环境中连接人体运动和场景几何。","abstractEn":"Human behaviors in the real world naturally encode rich, long-term contextual information that can be leveraged to train embodied agents for perception, understanding, and acting.However, existing capture systems typically rely on costly studio setups and wearable devices, limiting the large-scale collection of scene-conditioned human motion data in the wild.To address this, we propose EmbodMocap, a portable and affordable data collection pipeline using two moving iPhones. Our key idea is to jointly calibrate dual RGB-D sequences to reconstruct both humans and scenes within a unified metric world coordinate frame.The proposed method allows metric-scale and scene-consistent capture in everyday environments without static cameras or markers, bridging human motion and scene geometry seamlessly.Based on the collected data, we empower three embodied AI tasks: monocular human-scene-reconstruction, where we fine-tune on feedforward models that output metric-scale, world-space aligned humans and scenes; physics-based character animation, where we prove our data could be used to scale human-object interaction skills and scene-aware motion tracking; and robot motion control, where we train a humanoid robot via sim-to-real RL to replicate human motions depicted in videos. Experimental results validate the effectiveness of our pipeline and its contributions towards advancing embodied AI research.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_EmbodMocap_In-the-Wild_4D_Human-Scene_Reconstruction_for_Embodied_Agents_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_EmbodMocap_In-the-Wild_4D_Human-Scene_Reconstruction_for_Embodied_Agents_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.23205"},{"level":"B","directionZh":"从动作到物理","directionEn":"Motion to physics","title":"IMU-HOI: A Symbiotic Framework for Coherent Human-Object Interaction and Motion Capture via Contact-Conscious Inertial Fusion","summaryZh":"IMU-HOI 从人体和物体上的稀疏 IMU 联合恢复全身人体姿态与物体 6DoF 轨迹，并显式推断手-物接触。","summaryEn":"IMU-HOI jointly recovers human pose and object trajectory from sparse body and object IMUs with explicit contact reasoning.","abstractZh":"IMU-HOI 面向人体-物体交互动作捕捉，使用人体和物体上的稀疏 IMU 联合恢复全身姿态和物体 6DoF 轨迹。方法直接从 IMU 流中推断概率性手-物接触，并将接触作为高层信号，在三阶段融合流程中修正人体姿态、root 平移和物体运动。实验显示该框架可提升复杂 HOI 场景中的惯性动作捕捉精度，并能扩展现有 sparse-IMU mocap backbone。","abstractEn":"Capturing full-body human motion with object interactions is crucial for AR/VR and robotics applications, yet it remains challenging for conventional vision-based methods due to occlusions and constrained capture volumes. Inertial measurement units (IMUs) offer a compelling alternative without line-of-sight requirements, but existing IMU-based motion capture assumes an isolated human and ignores object contacts and dynamics. To bridge this gap, we present IMU-HOI, a novel framework that jointly recovers full-body human pose and 6-DoF object trajectory from sparse IMUs on the body and object, explicitly modeling human-object Interaction.Our approach first infers probabilistic hand-object contacts directly from IMU streams and uses them as a high-level signal to route between kinematic and inertial reasoning. These contact cues drive a three-stage fusion pipeline that refines human pose and root translation, and fuses hand-based forward kinematics with object-IMU integration for object motion, yielding coherent, drift-resilient trajectories for both human and object. Experiments on challenging human-object interaction scenarios demonstrate substantial accuracy gains over prior inertial motion capture methods. Moreover, IMU-HOI can be plugged into existing sparse-IMU mocap backbones with minimal changes, effectively extending the scope of purely inertial motion capture from isolated humans to full human-object interaction and joint motion estimation.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Lin_IMU-HOI_A_Symbiotic_Framework_for_Coherent_Human-Object_Interaction_and_Motion_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Lin_IMU-HOI_A_Symbiotic_Framework_for_Coherent_Human-Object_Interaction_and_Motion_CVPR_2026_paper.pdf","arxiv":""},{"level":"A","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"FlashCap: Millisecond-Accurate Human Motion Capture via Flashing LEDs and Event-Based Vision","summaryZh":"FlashCap 使用闪烁 LED 与事件视觉构建毫秒级人体动作捕捉系统，并发布包含 event、RGB、LiDAR 和 IMU 的 FlashMotion 数据集。","summaryEn":"FlashCap uses flashing LEDs and event-based vision to build a millisecond-resolution human motion capture system and dataset.","abstractZh":"FlashCap 关注精确动作时序 PMT，指出毫秒级差异可能决定竞技结果，但现有 HPE 研究缺少高时间分辨率标注数据。论文提出基于闪烁 LED 的动作捕捉系统，采集包含 event、RGB、LiDAR 和 IMU 的 FlashMotion 数据集，并提出 ResPose 基线，用 event 与 RGB 学习残差姿态。实验显示 ResPose 将姿态估计误差降低 40%，并达到毫秒级时序精度。","abstractEn":"Precise motion timing (PMT) is crucial for swift motion analysis. A millisecond difference may determine victory or defeat in sports competitions. Despite substantial progress in human pose estimation (HPE), PMT remains largely overlooked by the HPE community due to the limited availability of high-temporal-resolution labeled datasets. Today, PMT is achieved using high-speed RGB cameras in specialized scenarios such as the Olympic Games; however, their high costs, light sensitivity, bandwidth, and computational complexity limit their feasibility for daily use. We developed FlashCap, the first flashing LED-based MoCap system for PMT. With FlashCap, we collect a millisecond-resolution human motion dataset, FlashMotion, comprising the event, RGB, LiDAR, and IMU modalities, and demonstrate its high quality through rigorous validation. To evaluate the merits of FlashMotion, we perform two tasks: precise motion timing and high-temporal-resolution HPE. For these tasks, we propose ResPose, a simple yet effective baseline that learns residual poses based on events and RGBs. Experimental results show that ResPose reduces pose estimation errors by 40% and achieves millisecond-level timing accuracy, enabling new research opportunities. The dataset and code will be shared with the community.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wu_FlashCap_Millisecond-Accurate_Human_Motion_Capture_via_Flashing_LEDs_and_Event-Based_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wu_FlashCap_Millisecond-Accurate_Human_Motion_Capture_via_Flashing_LEDs_and_Event-Based_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.19770"},{"level":"A","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"Ultra Diffusion Poser: Diffusion-Based Human Motion Tracking from Sparse Inertial Sensors and Ranging-based Between-sensor Distances","summaryZh":"Ultra Diffusion Poser 将 IMU、UWB 传感器间距离和扩散模型结合，以几何约束提升稀疏惯性人体动作追踪。","summaryEn":"Ultra Diffusion Poser combines IMUs, UWB distances, and diffusion guidance to improve sparse inertial human motion tracking.","abstractZh":"Ultra Diffusion Poser 面向稀疏惯性传感器人体动作追踪，利用 UWB 测距缓解 IMU 漂移。论文不只把 UWB 距离作为输入特征，而是通过 Spatial Layout Module 从距离解析 3D 传感器布局，并在扩散采样中加入 UWB-Diffusion Guidance，促使预测姿态符合实测距离约束。实验显示该方法相较先前工作最多降低 22% 关节位置误差。","abstractEn":"Methods using inertial measurement units (IMUs) provide a wearable alternative to camera-based motion capture. To mitigate drift from inertial signals, recent sparse inertial pose estimators integrate inter-sensor distances measured by ultra-wideband (UWB) ranging. So far, UWB distances have only been used as an additional input feature, ignoring the physical constraints they impose on sensor positions. However, these distances can also be used to reconstruct the underlying 3D sensor layout, which in turn provides more informative input for pose reconstruction. We propose Ultra Diffusion Poser, a diffusion model that explicitly models these geometric constraints. It includes a Spatial Layout Module that analytically reconstructs the 3D sensor positions from UWB measurements. These sensor positions are used alongside IMU signals and UWB distances as a conditioning signal during diffusion. Still, network predictions can violate inter-sensor distance measurements. To address this, we introduce UWB-Diffusion Guidance, which encourages alignment between predicted poses and measured distances during diffusion sampling. Together, these contributions enable our model to achieve state-of-the-art performance, reducing joint position error by up to 22% over prior work. Code can be found here https://github.com/eth-siplab/UltraDiffusionPoser.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Hollidt_Ultra_Diffusion_Poser_Diffusion-Based_Human_Motion_Tracking_from_Sparse_Inertial_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Hollidt_Ultra_Diffusion_Poser_Diffusion-Based_Human_Motion_Tracking_from_Sparse_Inertial_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","directionZh":"体育专项","directionEn":"Sports-specific","title":"MS^2Gait: A Multi-Scale Spatio-Temporal Fusion Network for LiDAR-based Gait Recognition","summaryZh":"MS^2Gait 针对原始点云步态识别，使用多尺度空间依赖建模和相似性驱动的时间增强来提升 LiDAR gait recognition。","summaryEn":"MS^2Gait uses multi-scale spatial-temporal modeling for raw point-cloud gait recognition with LiDAR.","abstractZh":"MS^2Gait 面向 3D LiDAR 步态识别，利用 LiDAR 对光照鲁棒、保护隐私和远距离非接触识别的优势。论文指出现有点云方法难以建模跨尺度空间相关和步态时间异质性，因此提出层级空间特征提取与相似性驱动的时间增强 Transformer。方法直接处理原始点云，并在步态识别数据集上提升了多尺度结构恢复和时间聚合能力。","abstractEn":"3D LiDAR-based gait recognition has gained increasing attention due to its robustness to illumination, privacy preservation, and capability for long-range and non-contact identity verification. However, existing point cloud-based methods suffer from two critical limitations: they fail to model semantically distant correlations across spatial scales and employ simplistic temporal aggregation that cannot handle gait's inherent heterogeneity. To address these limitations, we propose MS^2Gait, a multi-scale spatio-temporal framework tailored for raw point cloud gait recognition. Our Hierarchical Spatial Feature Extraction module introduces four complementary interaction strategies to explicitly capture long-range semantic dependencies and recover structural information under blockage. Additionally, a Similarity-based Temporal Enhancement Transformer strategy leverages multi-scale aggregation to dynamically weight frames based on motion coherence, effectively handling temporal heterogeneity without explicit supervision. Extensive evaluations on SUSTech1K and FreeGait demonstrate that MS^2Gait achieves 93.5% and 83.1% in Rank-1 accuracy, respectively, outperforming prior state-of-the-art methods, while exhibiting significant robustness against non-gait nuisance factors.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_MS2Gait_A_Multi-Scale_Spatio-Temporal_Fusion_Network_for_LiDAR-based_Gait_Recognition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_MS2Gait_A_Multi-Scale_Spatio-Temporal_Fusion_Network_for_LiDAR-based_Gait_Recognition_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","directionZh":"体育专项","directionEn":"Sports-specific","title":"EventGait: Towards Robust Gait Recognition with Event Streams","summaryZh":"EventGait 用事件相机的微秒级时间分辨率和高动态范围，分别建模步态运动与形状以提升复杂光照下的识别鲁棒性。","summaryEn":"EventGait uses event streams to model gait motion and shape under challenging illumination and motion conditions.","abstractZh":"EventGait 探索使用事件相机进行步态识别，以缓解传统相机在非受控环境下受光照和运动影响的问题。方法采用端到端双流框架，动态流用 Mixture of Spiking Experts 建模复杂运动和光照下的动态感知，静态流通过 Cross-modal Structural Alignment 与大视觉模型学习密集形状表征。论文还提出事件步态合成流程并发布 SUSTech1K-E 与 CCGR-Mini-E，实验显示事件步态在低光条件下显著优于普通相机方案。","abstractEn":"Gait recognition enables non-intrusive, privacy-preserving identification but suffers in uncontrolled environments due to illumination and motion sensitivity in conventional cameras. In this work, we explore gait recognition using event cameras, which offer microsecond temporal resolution and high dynamic range, naturally capturing robust dynamic cues and suppressing static noise. Existing event-based approaches typically aggregate event streams into event images over long time windows, thereby discarding fine-grained motion dynamics critical for gait recognition. Therefore, we propose EventGait, an end-to-end dual-stream framework that separately models motion and shape while preserving the advantages of events. Our dynamic stream leverages a Mixture of Spiking Experts (MoSE) with diverse neuron constants for robust dynamic perception across complex motion and illumination scenes, while the static stream learns dense shape representations via Cross-modal Structural Alignment (CroSA) with large vision foundation models. To address the absence of large-scale event-based gait datasets, we introduce a synthesis pipeline and release two new benchmarks: SUSTech1K-E and CCGR-Mini-E. Extensive experiments have shown that event-based gait recognition not only achieves results comparable to camera-based gait recognition under normal conditions but also significantly outperforms it in low-light scenarios. Our approach sets a new state of the art on both synthesized and real-world event-based gait benchmarks, highlighting the robustness and potential of event-driven gait analysis. The code and datasets are released at https://github.com/QUEAHREN/EventGait.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_EventGait_Towards_Robust_Gait_Recognition_with_Event_Streams_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_EventGait_Towards_Robust_Gait_Recognition_with_Event_Streams_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.22139"},{"level":"S","directionZh":"从姿态到动作理解","directionEn":"Pose to motion understanding","title":"Action Motifs: Self-Supervised Hierarchical Representation of Human Body Movements","summaryZh":"A4Mer 以自监督方式从 3D pose 序列中学习 Action Atoms 和 Action Motifs，形成可复用的人体动作层级表征。","summaryEn":"Action Motifs learns reusable hierarchical movement units from 3D pose sequences through self-supervised learning.","abstractZh":"论文提出由 Action Atoms 和 Action Motifs 组成的人体运动层级表征，前者表示原子级关节运动，后者由时间组合形成并编码跨动作复用的相似身体运动。A4Mer 是一个嵌套 latent Transformer，通过可变长度分段和 masked token prediction 在 pose 数据上自监督学习该表征。作者还发布 AMD 多视角人体行为数据集，带有完整 SMPL 标注；实验显示 learned motifs 能提升动作识别、运动预测和运动插值。","abstractEn":"Effective human behavior modeling requires a representation of the human body movement that capitalizes on its compositionality. We propose a hierarchical representation consisting of Action Atoms that capture the atomic joint movements and Action Motifs that are formed by their temporal compositions and encode similar body movements found across different overall human actions. We derive A4Mer, a nested latent Transformer to learn this hierarchical representation from human pose data in a fully self-supervised manner. A4Mer splits a 3D pose sequence into variable-length segments and represents each segment as a single latent token (Action Atoms). Through bottom-up representation learning, temporal patterns composed of these Action Atoms, which capture meaningful temporal spans of reusable, semantic segments of body movements, naturally emerge (Action Motifs). A4Mer achieves this with a unified pretext task of masked token prediction in their respective latent spaces. We also introduce Action Motif Dataset (AMD), a large-scale dataset of multi-view human behavior videos with full SMPL annotations. We introduce a novel use of cameras by mounting them on the feet to achieve their frame-wise annotations despite frequent and heavy body occlusions. Experimental results demonstrate the effectiveness of A4Mer for extracting meaningful Action Motifs, which significantly benefit human behavior modeling tasks including action recognition, motion prediction, and motion interpolation.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Kinoshita_Action_Motifs_Self-Supervised_Hierarchical_Representation_of_Human_Body_Movements_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Kinoshita_Action_Motifs_Self-Supervised_Hierarchical_Representation_of_Human_Body_Movements_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.28173"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"Chain of World: World Model Thinking in Latent Motion","summaryZh":"CoWVLA 将视频片段分解为结构 latent 和运动 latent，让 VLA 在 latent motion chain 中进行时间因果推理和动作预测。","summaryEn":"CoWVLA models latent motion chains to bring temporal-causal world-model reasoning into vision-language-action learning.","abstractZh":"Chain of World 指出 VLA 模型常忽略视觉动态背后的预测和时间因果结构，而直接预测未来帧又浪费容量重建背景。CoWVLA 使用预训练视频 VAE 抽取 latent motion，将视频片段显式分解为结构和运动 latent；预训练阶段从指令和初始帧推断连续 latent motion chain 并预测终止帧，随后与离散动作预测联合建模。机器人仿真实验显示该范式优于现有 world-model 和 latent-action 方法。","abstractEn":"Vision-Language-Action (VLA) models are promising for embodied intelligence, yet they often overlook the predictive and temporal-causal structure underlying visual dynamics. World-model VLAs address this by predicting future frames, but waste capacity reconstructing redundant backgrounds. To overcome these limitations, we introduce CoWVLA, a new \"Chain of World\" paradigm that unifies world-model temporal reasoning with a disentangled latent motion representation. First, a pretrained video VAE serves as a latent motion extractor, explicitly factorizing video segments into structure and motion latents. Then, during pre-training, the VLA learns from an instruction and an initial frame to infer a continuous latent motion chain and predict the segment's terminal frame. Finally, during co-fine-tuning, this latent dynamic is aligned with discrete action prediction by jointly modeling sparse keyframes and action sequences in a unified autoregressive decoder. This design preserves the world-model benefits of temporal reasoning and world knowledge while retaining the compactness and interpretability of latent actions, enabling efficient visuomotor learning. Extensive experiments on robotic simulation benchmarks show that CoWVLA outperforms existing world-model and latent-action approaches and achieves moderate computational efficiency, highlighting its potential as a more effective VLA pretraining paradigm. Project website: https://fx-hit.github.io/cowvla-io.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_Chain_of_World_World_Model_Thinking_in_Latent_Motion_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_Chain_of_World_World_Model_Thinking_in_Latent_Motion_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.03195"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"GeoWorld: Geometric World Models","summaryZh":"GeoWorld 将能量式预测 world model 的 latent 表征映射到双曲几何空间，以保留状态间的层级和几何关系并改善多步规划。","summaryEn":"GeoWorld maps predictive world-model representations into hyperbolic geometry to preserve hierarchy and improve planning.","abstractZh":"GeoWorld 针对能量式预测 world model 在长程视觉规划中的两个问题：latent 通常在欧氏空间学习而忽略几何/层级结构，以及长时预测快速退化。方法通过 Hyperbolic JEPA 将 latent 表征映射到双曲流形，并用 Geometric Reinforcement Learning 在双曲 latent 空间中做能量优化。CrossTask 和 COIN 实验显示其在 3-step 和 4-step planning 上相对 V-JEPA-2 有提升。","abstractEn":"Energy-based predictive world models provide a powerful approach for multi-step visual planning by reasoning over latent energy landscapes rather than generating pixels. However, existing approaches face two major challenges: (i) their latent representations are typically learned in Euclidean space, neglecting the underlying geometric and hierarchical structure among states, and (ii) they struggle with long-horizon prediction, which leads to rapid degradation across extended rollouts. To address these challenges, we introduce GeoWorld, a geometric world model that preserves geometric structure and hierarchical relations through a Hyperbolic JEPA, which maps latent representations from Euclidean space onto hyperbolic manifolds. We further introduce Geometric Reinforcement Learning for energy-based optimization, enabling stable multi-step planning in hyperbolic latent space. Extensive experiments on CrossTask and COIN demonstrate around 3% SR improvement in 3-step planning and 2% SR improvement in 4-step planning compared to the state-of-the-art V-JEPA-2.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhang_GeoWorld_Geometric_World_Models_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhang_GeoWorld_Geometric_World_Models_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.23058"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"VerseCrafter: Dynamic Realistic Video World Model with 4D Geometric Control","summaryZh":"VerseCrafter 用静态背景点云和多物体 3D Gaussian 轨迹组成 4D 几何控制表示，以生成可控的动态真实视频。","summaryEn":"VerseCrafter controls video world generation through a 4D geometric state of background point clouds and object trajectories.","abstractZh":"VerseCrafter 是一个几何驱动的视频 world model，目标是从统一 4D 几何世界状态生成动态真实视频。其 4D Geometric Control 表示由静态背景点云和每个物体的 3D Gaussian 轨迹组成，能表达物体运动路径和随时间变化的 3D 占据。方法将该表示渲染为 4D control maps 并输入预训练视频扩散模型；作者还构建 VerseControl4D 数据集，实验显示其相机和多物体运动控制优于先前方法。","abstractEn":"Video world models aim to simulate dynamic, real-world environments, yet existing methods struggle to provide unified and precise control over camera and multi-object motion, as videos inherently capture dynamics in the projected 2D image plane. To bridge this gap, we introduce VerseCrafter, a geometry-driven video world model that generates dynamic, realistic videos from a unified 4D geometric world state. Our approach is centered on a novel 4D Geometric Control representation, which encodes the world state as a static background point cloud and per-object 3D Gaussian trajectories. This representation captures each object's motion path and probabilistic 3D occupancy over time, providing a flexible, category-agnostic alternative to rigid bounding boxes and parametric models. We render 4D Geometric Control into 4D control maps for a pretrained video diffusion model, enabling high-fidelity, view-consistent video generation that faithfully follows the specified dynamics. To enable training at scale, we develop an automatic data engine and construct VerseControl4D, a real-world dataset of 35K training samples with automatically derived prompts and rendered 4D control maps. Extensive experiments show that VerseCrafter achieves superior visual quality and more accurate control over camera and multi-object motion than prior methods.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_VerseCrafter_Dynamic_Realistic_Video_World_Model_with_4D_Geometric_Control_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_VerseCrafter_Dynamic_Realistic_Video_World_Model_with_4D_Geometric_Control_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.05138"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"PhysInOne: Visual Physics Learning and Reasoning in One Suite","summaryZh":"PhysInOne 提供 200 万物理视频和完整 3D/语义/运动/物理属性标注，用于训练和评估物理 grounded world models。","summaryEn":"PhysInOne provides a large-scale synthetic dataset for learning and evaluating physically grounded visual world models.","abstractZh":"PhysInOne 是一个大规模合成物理数据集，缓解 physically-grounded AI 训练数据稀缺问题。它包含 153,810 个动态 3D 场景、200 万视频，覆盖力学、光学、流体和磁学中的 71 类基础物理现象，并提供 3D 几何、语义、动态运动、物理属性和文本描述标注。实验覆盖物理感知视频生成、未来帧预测、物理属性估计和运动迁移，显示微调基础模型可提升物理合理性，同时暴露复杂物理建模仍有明显缺口。","abstractEn":"We present PhysInOne, a large-scale synthetic dataset addressing the critical scarcity of physically-grounded training data for AI systems. Unlike existing datasets limited to merely hundreds or thousands of examples, PhysInOne provides 2 million videos across 153,810 dynamic 3D scenes, covering 71 basic physical phenomena in mechanics, optics, fluid dynamics, and magnetism. Distinct from previous works, our scenes feature multiobject interactions against complex backgrounds, with comprehensive ground-truth annotations including 3D geometry, semantics, dynamic motion, physical properties, and text descriptions. We demonstrate PhysInOne's efficacy across four emerging applications: physics-aware video generation, long-/short-term future frame prediction, physical property estimation, and motion transfer. Experiments show that fine-tuning foundation models on PhysInOne significantly enhances physical plausibility, while also exposing critical gaps in modeling complex physical dynamics and estimating intrinsic properties. As the largest dataset of its kind, orders of magnitude beyond prior works, PhysInOne establishes a new benchmark for advancing physics-grounded world models in generation, simulation, and embodied AI.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zhou_PhysInOne_Visual_Physics_Learning_and_Reasoning_in_One_Suite_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zhou_PhysInOne_Visual_Physics_Learning_and_Reasoning_in_One_Suite_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.09415"},{"level":"A","directionZh":"从物理到 world model","directionEn":"Physics to world models","title":"PhyCritic: Multimodal Critic Models for Physical AI","summaryZh":"PhyCritic 通过两阶段 RLVR 训练面向 Physical AI 的多模态 critic，使模型能评价物理感知、因果推理和规划输出。","summaryEn":"PhyCritic trains multimodal critic models to evaluate physical perception, causal reasoning, and planning responses.","abstractZh":"PhyCritic 关注 Physical AI 中开放式评价和偏好对齐所需的 judge/critic 模型。现有 critic 多训练于通用视觉任务，缺少对物理感知、因果推理和规划的评估能力；PhyCritic 通过物理技能 warmup 和 self-referential critic finetuning 两阶段 RLVR 训练，先增强物理推理，再让 critic 生成内部参考以稳定判断。实验显示其在物理和通用多模态 judge benchmark 上优于开源基线。","abstractEn":"With the rapid development of large multimodal models, reliable judge and critic models have become essential for open-ended evaluation and preference alignment, providing pairwise preferences, numerical scores, and explanatory justifications for assessing model-generated responses. However, existing critics are primarily trained in general visual domains such as captioning or image question answering, leaving physical AI tasks involving perception, causal reasoning, and planning largely underexplored. We introduce PhyCritic, a multimodal critic model optimized for physical AI through a two-stage RLVR pipeline: a physical skill warmup stage that enhances physically oriented perception and reasoning, followed by self-referential critic finetuning, where the critic generates its own prediction as an internal reference before judging candidate responses, improving judgment stability and physical correctness. Across both physical and general-purpose multimodal judge benchmarks, PhyCritic achieves strong performance gains over open-source baselines and, when applied as a policy model, further improves perception and reasoning in physically grounded tasks.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xiong_PhyCritic_Multimodal_Critic_Models_for_Physical_AI_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xiong_PhyCritic_Multimodal_Critic_Models_for_Physical_AI_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.11124"},{"level":"A","directionZh":"从动作到物理","directionEn":"Motion to physics","title":"InterPrior: Scaling Generative Control for Physics-Based Human-Object Interactions","summaryZh":"InterPrior 通过大规模模仿预训练和强化学习后训练，学习可泛化的物理人体-物体交互生成控制先验。","summaryEn":"InterPrior learns scalable generative control priors for physically coherent whole-body human-object interaction.","abstractZh":"InterPrior 面向物理人体-物体交互的生成式控制，认为高层 affordance 可定义目标，而平衡、接触和操作应从底层物理与运动先验中涌现。框架先将全参考模仿专家蒸馏为 goal-conditioned variational policy，再用物理扰动数据增强和强化学习微调，将重建的 latent skills 整合为有效动作流形。结果显示该先验能泛化到未见目标、初始状态和物体，并支持交互式控制和真实机器人部署。","abstractEn":"Humans rarely plan whole-body interactions with objects at the level of explicit whole-body movements. High-level intentions, such as affordance, define the goal, while coordinated balance, contact, and manipulation can emerge naturally from underlying physical and motor priors. Scaling such priors is key to enabling humanoids to compose and generalize loco-manipulation skills across diverse contexts while maintaining physically coherent whole-body coordination. To this end, we introduce InterPrior, a scalable framework that learns a unified generative controller through large-scale imitation pretraining and post-training by reinforcement learning. InterPrior first distills a full-reference imitation expert into a versatile, goal-conditioned variational policy that reconstructs motion from multimodal observations and high-level intent. While the distilled policy reconstructs training behaviors, it does not generalize reliably due to the vast configuration space of large-scale human-object interactions. To address this, we apply data augmentation with physical perturbations, and then perform reinforcement learning finetuning to improve competence on unseen goals and initializations. Together, these steps consolidate the reconstructed latent skills into a valid manifold, yielding a motion prior that generalizes beyond the training data, e.g., it can incorporate new behaviors such as interactions with unseen objects. We further demonstrate its effectiveness for user-interactive control and its potential for real robot deployment.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xu_InterPrior_Scaling_Generative_Control_for_Physics-Based_Human-Object_Interactions_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xu_InterPrior_Scaling_Generative_Control_for_Physics-Based_Human-Object_Interactions_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.06035"},{"level":"A","directionZh":"从动作到物理","directionEn":"Motion to physics","title":"PAMotion: Physics-Aware Motion Generation for Full-Body Interaction with Multiple Objects","summaryZh":"PAMotion 用物体加速度与接触状态之间的物理关系约束扩散模型，生成多物体全身交互动作。","summaryEn":"PAMotion adds acceleration-contact physical constraints to diffusion-based full-body human-object motion generation.","abstractZh":"PAMotion 是一个物理感知扩散框架，用于生成真实的多物体全身人体交互。论文利用慢速日常场景中的观察：如果物体加速度与重力一致，通常说明无接触；否则说明存在人体或其他物体接触。方法联合建模人体运动、物体运动和加速度，并用 physics-aware interaction loss 约束加速度与接触状态一致；通过粗到细流程先合成 torso 和物体平移，再细化手部动作与物体旋转。","abstractEn":"We present PAMotion, a physics-aware diffusion framework for generating realistic full-body human interactions with multiple objects.Existing diffusion-based methods that jointly synthesize human and object motions often struggle to capture the intricate physical interactions--especially those involving complex hand-object contacts. To address this issue, in this paper, we begin with our key observation: in everyday, slow-motion scenarios, object accelerations inherently reveal the underlying physical interactions.If an object's acceleration aligns with gravity, it is likely in free motion with no physical contact from human or other objects; otherwise, it must be in contact--directly or indirectly--with the human body. Building on this intuition, PAMotion jointly models full-body human motion, object motion, and their corresponding accelerations, enforcing physical plausibility through a physics-aware interaction loss.In this loss, we softly penalizes violations of consistency between object acceleration and human-object contact states. PAMotion follows a coarse-to-fine pipline: we first synthesize global torso and object translations, then conditionally refine hand motions and object rotations, achieving both high-level motion-text consistency and low-level physical fidelity. Experiments on two challenging datasets HIMO and ParaHome demonstrate that PAMotion achieves state-of-the-art performance in generating realistic, physically consistent full-body manipulation sequences involving multiple objects. Our code is released at https://github.com/liyuheng520/PAMotion.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Di_PAMotion_Physics-Aware_Motion_Generation_for_Full-Body_Interaction_with_Multiple_Objects_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Di_PAMotion_Physics-Aware_Motion_Generation_for_Full-Body_Interaction_with_Multiple_Objects_CVPR_2026_paper.pdf","arxiv":""},{"level":"S","directionZh":"从视频到姿态","directionEn":"Video to pose","title":"RAM: Recover Any 3D Human Motion in-the-Wild","summaryZh":"RAM 面向野外单目视频，实时恢复多人 3D 人体运动，并在遮挡、快速运动和视角变化下保持身份与轨迹连续。","summaryEn":"RAM recovers real-time 3D human motion from in-the-wild monocular video under occlusion, fast motion, and viewpoint changes.","abstractZh":"RAM 解决野外单目视频 3D 人体运动恢复中的遮挡、快速运动和视角变化问题。框架包含带自适应 Kalman filtering 的 motion-aware semantic tracker，用于严重遮挡和动态交互中的身份关联；memory-augmented Temporal HMR 用时空先验增强运动重建；轻量 Predictor 预测未来姿态以维持连续性，并通过 gated combiner 融合重建与预测特征。PoseTrack 和 3DPW 等野外多人 benchmark 实验显示 RAM 在 zero-shot 跟踪稳定性和 3D 精度上优于先前方法。","abstractEn":"Recovering 3D human motion from monocular videos in-the-wild remains challenging due to occlusions, rapid movements, and viewpoint variations. To address these challenges, we introduce **Recover-Anyone Module (RAM)**, a unified framework for real-time and accurate 3D human motion reconstruction. RAM incorporates a motion-aware semantic tracker with adaptive Kalman filtering to achieve robust identity association under severe occlusions and dynamic interactions. A memory-augmented Temporal HMR module further enhances human motion reconstruction by injecting spatio-temporal priors for consistent and smooth motion estimation. Moreover, a lightweight Predictor module forecasts future poses to maintain reconstruction continuity, while a gated combiner adaptively fuses reconstructed and predicted features to ensure coherence and robustness. Experiments on in-the-wild multi-person benchmarks such as PoseTrack and 3DPW, demonstrate that RAM substantially outperforms previous state-of-the-art in both Zero-shot tracking stability and 3D accuracy, offering a generalizable paradigm for markerless 3D human motion capture in-the-wild.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Jia_RAM_Recover_Any_3D_Human_Motion_in-the-Wild_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Jia_RAM_Recover_Any_3D_Human_Motion_in-the-Wild_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.19929"},{"level":"A","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"SV-GS: Sparse View 4D Reconstruction with Skeleton-Driven Gaussian Splatting","summaryZh":"SV-GS 在稀疏时间和稀疏视角观测下，借助粗骨架图和 Gaussian Splatting 同时估计动态目标形变和运动。","summaryEn":"SV-GS estimates dynamic target motion and deformation from sparse temporal and viewpoint observations using skeleton-driven Gaussian Splatting.","abstractZh":"SV-GS 针对大范围动态目标的稀疏视角 4D 重建问题，认为现实场景很难获得每个时间点的密集多视角视频。方法以粗骨架图和初始静态重建为引导，同时估计形变模型和目标运动；骨架驱动形变场由粗关节姿态估计器和细粒度形变模块组成，只让关节姿态估计器随时间变化，从而实现平滑运动插值并保留几何细节。实验显示其在稀疏观测下显著优于现有方法。","abstractEn":"Reconstructing a dynamic target moving over a large area is challenging. Standard approaches for dynamic object reconstruction require dense coverage in both the viewing space and the temporal dimension, typically relying on multi-view videos captured at each time step.However, such setups are only possible in constrained environments. In real-world scenarios, observations are often sparse over time and captured sparsely from diverse viewpoints (e.g., from security cameras), making dynamic reconstruction highly ill-posed. We present SV-GS, a framework that simultaneously estimates a deformation model and the object's motion over time under sparse observations. To initialize SV-GS, we leverage a rough skeleton graph and an initial static reconstruction as inputs to guide motion estimation. (Later, we show that this input requirement can be relaxed.) Our method optimizes a skeleton-driven deformation field composed of a coarse skeleton joint pose estimator and a module for fine-grained deformations. By making only the joint pose estimator time-dependent, our model enables smooth motion interpolation while preserving learned geometric details. Experiments on synthetic datasets show that our method outperforms existing approaches under sparse observations by up to 34% in PSNR, and achieves comparable performance to dense monocular video methods on real-world datasets despite using significantly fewer frames. Moreover, we demonstrate that the input initial static reconstruction can be replaced by a diffusion-based generative prior, making our method more practical for real-world scenarios.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Chao_SV-GS_Sparse_View_4D_Reconstruction_with_Skeleton-Driven_Gaussian_Splatting_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Chao_SV-GS_Sparse_View_4D_Reconstruction_with_Skeleton-Driven_Gaussian_Splatting_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2601.00285"},{"level":"A","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"CARI4D: Category Agnostic 4D Reconstruction of Human-Object Interaction","summaryZh":"CARI4D 从单目 RGB 视频中类别无关地重建人体-物体交互的米制 4D 时空结构，并通过接触推理增强物理一致性。","summaryEn":"CARI4D reconstructs metric-scale 4D human-object interaction from monocular RGB video without fixed object categories.","abstractZh":"CARI4D 是首个从单目 RGB 视频进行类别无关人体-物体交互 4D 重建的方法。它不依赖真实物体模板或固定物体类别，而是通过 pose hypothesis selection 整合 foundation model 的个体预测，并用 learned render-and-compare 范式联合优化空间、时间和像素对齐，最后通过复杂接触推理进一步满足物理约束。实验显示其在域内和未见类别数据上均显著降低重建误差，并可 zero-shot 应用于野外互联网视频。","abstractEn":"Accurate capture of human-object interaction from ubiquitous sensors like RGB cameras is important for applications in human understanding, gaming, and robot learning. However, inferring 4D interactions from a single RGB view is highly challenging due to the unknown object and human information, depth ambiguity, occlusion, and complex motion, which hinder consistent 3D and temporal reconstruction. Previous methods simplify the setup by assuming ground truth object template or constraining to a limited set of object categories. We present CARI4D, the first category-agnostic method that reconstructs spatially and temporarily consistent 4D human-object interaction at metric scale from monocular RGB videos. To this end, we propose a pose hypothesis selection algorithm that robustly integrates the individual predictions from foundation models, jointly refine them through a learned render-and-compare paradigm to ensure spatial, temporal and pixel alignment, and finally reasoning about intricate contacts for further refinement satisfying physical constraints. Experiments show that our method outperforms prior art by 35% on in-distribution dataset and 36% on unseen dataset in terms of reconstruction error. Our model generalizes beyond the training categories and thus can be applied zero-shot to in-the-wild internet videos. Our code and pretrained models will be publicly released.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Xie_CARI4D_Category_Agnostic_4D_Reconstruction_of_Human-Object_Interaction_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Xie_CARI4D_Category_Agnostic_4D_Reconstruction_of_Human-Object_Interaction_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2512.11988"},{"level":"B","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"WildPose: A Unified Framework for Robust Pose Estimation in the Wild","summaryZh":"WildPose 是动态环境下的单目相机位姿估计框架，将 feed-forward 感知前端与可微 bundle adjustment 结合以提升 SLAM/SfM 鲁棒性。","summaryEn":"WildPose estimates monocular camera pose in dynamic environments by combining feed-forward perception and differentiable bundle adjustment.","abstractZh":"WildPose 处理的是动态环境中的相机位姿估计，而不是人体 pose estimation。论文指出传统视觉 SLAM 和 SfM 多假设静态环境，现有 dynamic-aware 方法又常不统一或对短序列、静态场景不稳。WildPose 结合 feed-forward 模型的感知前端和可微 bundle adjustment，通过冻结的 MASt3R 特征 backbone、3D-aware update operator 和高容量 motion mask detector，在动态、静态和低自运动数据集上均优于先前方法。","abstractEn":"Estimating camera pose in dynamic environments is a critical challenge, as most visual SLAM and SfM methods assume inputs from static environments. While recent dynamic-aware methods exist, they are often not unified: semantic-based approaches are brittle, per-sequence optimization methods fail on short sequences, and other learned models sometimes perform badly on static-only scenes. We present Wildpose, a unified monocular pose estimation framework that is robust in dynamic environments while maintaining state-of-the-art performance on static and low-ego-motion datasets. Our key insight is to connect the two powerful paradigms in modern 3D vision: the rich perceptual frontend of feed-forward models and the end-to-end optimization of differentiable bundle adjustment (BA). We achieve this by enhancing the differentiable BA pipeline in two ways. First, we introduce a new 3D-aware update operator by integrating a frozen, pre-trained MASt3R feature backbone and training the operator's subsequent layers on a diverse curriculum of static and dynamic data. Second, we propose a high-capacity motion mask detector that leverages rich, multi-level 3D-aware features from the same frozen backbone. Extensive experiments show Wildpose consistently outperforms prior methods across a wide variety of benchmarks, including dynamic (Wild-SLAM, Bonn), static (TUM, 7-Scenes), and low-ego-motion (Sintel) datasets.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_WildPose_A_Unified_Framework_for_Robust_Pose_Estimation_in_the_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_WildPose_A_Unified_Framework_for_Robust_Pose_Estimation_in_the_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2605.12774"},{"level":"A","directionZh":"从姿态到动作理解","directionEn":"Pose to motion understanding","title":"Superman: Unifying Skeleton and Vision for Human Motion Perception and Generation","summaryZh":"Superman 用视觉引导的 motion tokenizer 统一骨架与视觉表征，使同一 MLLM 同时支持视频 3D 姿态感知和骨架运动生成。","summaryEn":"Superman connects visual perception and skeleton-based motion generation through a vision-guided motion tokenizer and unified MLLM.","abstractZh":"Superman 针对人体运动分析中感知模型与生成模型割裂的问题，提出统一视觉感知和骨架时序运动生成的框架。核心是 Vision-Guided Motion Tokenizer，利用 3D 骨架与视觉数据的几何对齐，学习跨模态 motion vocabulary；随后用一个统一 MLLM 处理多种时序输入，覆盖视频 3D 骨架姿态估计、运动预测和 motion in-betweening。Human3.6M 等实验显示其在多个运动任务上达到 SOTA 或竞争性能。","abstractEn":"Human motion analysis tasks, such as temporal 3D pose estimation, motion prediction, and motion in-betweening, play an essential role in computer vision. However, current paradigms suffer from severe fragmentation. First, the field is split between \"perception\" models that understand motion from video but only output text, and \"generation\" models that cannot perceive from raw visual input. Second, generative MLLMs are often limited to single-frame, static poses using dense, parametric SMPL models, failing to handle temporal motion. Third, existing motion vocabularies are built from skeleton data alone, severing the link to the visual domain. To address these challenges, we introduce Superman, a unified framework that bridges visual perception with temporal, skeleton-based motion generation. Our solution is twofold. First, to overcome the modality disconnect, we propose a Vision-Guided Motion Tokenizer. Leveraging the natural geometric alignment between 3D skeletons and visual data, this module pioneers robust joint learning from both modalities, creating a unified, cross-modal motion vocabulary. Second, grounded in this motion language, a single, unified MLLM architecture is trained to handle all tasks. This module flexibly processes diverse, temporal inputs, unifying 3D skeleton pose estimation from video (perception) with skeleton-based motion prediction and in-betweening (generation). Extensive experiments on standard benchmarks, including Human3.6M, demonstrate that our unified method achieves state-of-the-art or competitive performance across all motion tasks. This showcases a more efficient and scalable path for generative motion analysis using skeletons.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_Superman_Unifying_Skeleton_and_Vision_for_Human_Motion_Perception_and_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_Superman_Unifying_Skeleton_and_Vision_for_Human_Motion_Perception_and_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2602.02401"},{"level":"B","directionZh":"体育专项","directionEn":"Sports-specific","title":"MMGait: Towards Multi-Modal Gait Recognition","summaryZh":"MMGait 构建包含 RGB、深度、红外、LiDAR 和 4D Radar 的多模态步态 benchmark，并提出统一单模态、跨模态和多模态识别的 OmniGait。","summaryEn":"MMGait builds a multimodal gait benchmark across RGB, depth, infrared, LiDAR, and 4D radar sensors.","abstractZh":"MMGait 面向远距离、非配合身份识别中的多模态步态问题，指出现有方法多依赖 RGB 派生模态，难以满足真实场景中的跨模态检索和多源协作需求。数据集整合 RGB、深度、红外、LiDAR 和 4D Radar 五类传感器，形成 12 种模态、334,060 个序列和 725 名被试。论文评估单模态、跨模态和多模态范式，并提出 OmniGait 共享嵌入基线。","abstractEn":"Gait recognition has emerged as a powerful biometric technique for identifying individuals at a distance without requiring user cooperation. Most existing methods focus primarily on RGB-derived modalities, which fall short in real-world scenarios requiring multi-modal collaboration and cross-modal retrieval. To overcome these challenges, we present MMGait, a comprehensive multi-modal gait benchmark integrating data from five heterogeneous sensors, including an RGB camera, a depth camera, an infrared camera, a LiDAR scanner, and a 4D Radar system. MMGait contains twelve modalities and 334,060 sequences from 725 subjects, enabling systematic exploration across geometric, photometric, and motion domains. Based on MMGait, we conduct extensive evaluations on single-modal, cross-modal, and multi-modal paradigms to analyze modality robustness and complementarity. Furthermore, we introduce a new task, Omni Multi-Modal Gait Recognition, which aims to unify the above three gait recognition paradigms within a single model. We also propose a simple yet powerful baseline, OmniGait, which learns a shared embedding space across diverse modalities and achieves promising recognition performance. The MMGait benchmark, codebase, and pretrained checkpoints are publicly available at https://github.com/BNU-IVC/MMGait.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Wang_MMGait_Towards_Multi-Modal_Gait_Recognition_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Wang_MMGait_Towards_Multi-Modal_Gait_Recognition_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2604.15979"},{"level":"B","directionZh":"体育专项","directionEn":"Sports-specific","title":"HyperGait: Unleashing the Power of Parsing for Gait Recognition in the Wild via Hypergraph","summaryZh":"HyperGait 使用人体 parsing 序列和超图建模身体部位、语义位置与时间动态之间的高阶关系，以提升野外步态识别。","summaryEn":"HyperGait uses parsing sequences and hypergraph modeling to capture high-order body-part and temporal relations for gait recognition.","abstractZh":"HyperGait 基于 parsing 序列进行野外步态识别，认为 parsing 比二值轮廓和关键点骨架包含更高信息熵，但现有方法没有充分建模不同位置、语义和时间动态之间的非线性高阶关系。框架包含空间超图卷积模块和时间超图卷积模块，分别提取身体部位间细粒度空间关系和时序相关身体部位间的高阶时间信息。在 Gait3D 和 SUSTech1K 上，HyperGait 仅用 parsing 输入取得较强性能。","abstractEn":"In recent years, the gait parsing sequence has become increasingly popular due to its higher information entropy than the binary silhouette and the keypoint-based skeleton. However, existing parsing-based gait recognition methods have not fully explored the complex, non-linear relationships between features at different positions, semantic, and temporal dynamics levels, i.e., higher-order correlations. To unleash the power of parsing between human body parts and temporal dynamics, this paper proposes a novel hypergraph-based gait recognition framework, named HyperGait. The HyperGait contains a global head and two elaborately-designed modules. In particular, the Spatial Hypergraph Convolutional Module (SHCM) and the Temporal Hypergraph Convolutional Module (THCM) are designed to explore the high-order spatial-level and temporal-level features, respectively.The SHCM extracts fine-grained relationships between human body parts through the hypergraph.The THCM performs the high-order temporal information between temporally related human body parts.Comprehensive experiments on two large-scale gait datasets, i.e., Gait3D and SUSTech1K, show the superior performance of our proposed HyperGait.In highly challenging real-world scenarios, with only parsing as input, our HyperGait achieves the Rank-1 accuracy of 80.5% on the Gait3D dataset.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Zheng_HyperGait_Unleashing_the_Power_of_Parsing_for_Gait_Recognition_in_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Zheng_HyperGait_Unleashing_the_Power_of_Parsing_for_Gait_Recognition_in_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","directionZh":"从姿态到动作理解","directionEn":"Pose to motion understanding","title":"Spectral Scalpel: Amplifying Adjacent Action Discrepancy via Frequency-Selective Filtering for Skeleton-Based Action Segmentation","summaryZh":"Spectral Scalpel 通过频率选择性过滤抑制相邻动作共享频率、放大动作特有频率，从而改善骨架动作分割边界。","summaryEn":"Spectral Scalpel uses frequency-selective filtering to sharpen boundaries in skeleton-based temporal action segmentation.","abstractZh":"Spectral Scalpel 面向 skeleton-based temporal action segmentation，解决相邻动作时空模式区分不足导致的类别混淆和边界模糊。方法使用自适应多尺度谱过滤器编辑频谱，配合相邻动作 discrepancy loss，抑制不同动作之间的共享频率并放大动作特有频率。论文还加入 frequency-aware channel mixer 增强通道演化，在五个公开数据集上达到 SOTA。","abstractEn":"Skeleton-based Temporal Action Segmentation (STAS) seeks to densely segment and classify diverse actions within long, untrimmed skeletal motion sequences. However, existing STAS methodologies face challenges of limited inter-class discriminability and blurred segmentation boundaries, primarily due to insufficient distinction of spatio-temporal patterns between adjacent actions. To address these limitations, we propose Spectral Scalpel, a frequency-selective filtering framework aimed at suppressing shared frequency components between adjacent distinct actions while amplifying their action-specific frequencies, thereby enhancing inter-action discrepancies and sharpening transition boundaries. Specifically, Spectral Scalpel employs adaptive multi-scale spectral filters as scalpels to edit frequency spectra, coupled with a discrepancy loss between adjacent actions serving as the surgical objective. This design amplifies representational disparities between neighboring actions, effectively mitigating boundary localization ambiguities and inter-class confusion. Furthermore, complementing long-term temporal modeling, we introduce a frequency-aware channel mixer to strengthen channel evolution by aggregating spectra across channels. This work presents a novel paradigm for STAS that extends conventional spatio-temporal modeling by incorporating frequency-domain analysis. Extensive experiments on five public datasets demonstrate that Spectral Scalpel achieves state-of-the-art performance. Code is available at https://github.com/HaoyuJi/SpecScalpel.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_Spectral_Scalpel_Amplifying_Adjacent_Action_Discrepancy_via_Frequency-Selective_Filtering_for_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_Spectral_Scalpel_Amplifying_Adjacent_Action_Discrepancy_via_Frequency-Selective_Filtering_for_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.24134"},{"level":"B","directionZh":"从姿态到动作理解","directionEn":"Pose to motion understanding","title":"PRISM: Learning a Shared Primitive Space for Transferable Skeleton Action Representation","summaryZh":"PRISM 通过 motion generation 学习共享的骨架动作 primitive coefficient space，并将该结构化表征迁移到分类和检测任务。","summaryEn":"PRISM learns a transferable primitive-centric skeleton action representation from a motion generation objective.","abstractZh":"PRISM 面向长尾标签、组合动作和视角变化下的人体动作理解，提出以 primitive 为中心的 skeleton modeling 框架。它将动作序列表示为 primitive coefficient space 中的轨迹，用一组原子运动 primitive 的贡献解释观测运动；该表示通过物理 grounded、视角不变的 motion generation 学习，再顺序迁移到分类和逐帧检测任务。实验显示结构化 primitive space 能提升长尾、多标签数据集表现，并支持可解释动作推理。","abstractEn":"Real-world human action understanding remains challenging due to long-tailed label distributions, compositional motion patterns, and viewpoint variations. Existing skeleton-based methods often lack a structured and transferable representation of motion, and task-specific models for generation, classification, and detection are usually trained independently, resulting in fragmented pipelines and limited cross-task generalization. We present PRISM, a PRImitive-centric Skeleton Modeling framework that learns a shared motion representation from a motion generation objective and transfers it to perception tasks. PRISM represents each action sequence as a trajectory in a primitive coefficient space, which captures how a set of learned atomic motion primitives contribute to the observed motion. A structured decomposition module learns this representation in a physically grounded and view-invariant manner via motion generation. Instead of enforcing joint or unified training across tasks, PRISM provides a single primitive-centric representation that can be sequentially transferred to downstream classification and frame-wise detection through lightweight task heads. This representation introduces structure, compositionality, and improved generalization across distinct supervisions. PRISM consistently improves performance on long-tailed and multi-label datasets and enables interpretable reasoning over compositional and rare actions. Extensive experimental results show that the structured primitive space serves as a transferable and robust foundation for diverse action understanding tasks in real-world datasets.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Yang_PRISM_Learning_a_Shared_Primitive_Space_for_Transferable_Skeleton_Action_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Yang_PRISM_Learning_a_Shared_Primitive_Space_for_Transferable_Skeleton_Action_CVPR_2026_paper.pdf","arxiv":""},{"level":"B","directionZh":"从姿态到动作理解","directionEn":"Pose to motion understanding","title":"LaDy: Lagrangian-Dynamic Informed Network for Skeleton-based Action Segmentation via Spatial-Temporal Modulation","summaryZh":"LaDy 将拉格朗日动力学引入骨架动作分割，用广义力和能量一致性增强相似运动之间的动态区分与边界定位。","summaryEn":"LaDy injects Lagrangian dynamics and energy consistency into skeleton-based temporal action segmentation.","abstractZh":"LaDy 针对 skeleton-based temporal action segmentation 中只建模运动学而忽略物理动力学的问题。方法先由关节位置计算广义坐标，再在物理约束下估计拉格朗日项并合成广义力；Energy Consistency Loss 强制动能变化与合力做功一致。学习到的动力学信号通过时空调制模块增强空间语义和时间边界感知，在多个挑战数据集上达到 SOTA。","abstractEn":"Skeleton-based Temporal Action Segmentation (STAS) aims to densely parse untrimmed skeletal sequences into frame-level action categories. However, existing methods, while proficient at capturing spatio-temporal kinematics, neglect the underlying physical dynamics that govern human motion. This oversight limits inter-class discriminability between actions with similar kinematics but distinct dynamic intents, and hinders precise boundary localization where dynamic force profiles shift. To address these, we propose the Lagrangian-Dynamic Informed Network (LaDy), a framework integrating principles of Lagrangian dynamics into the segmentation process. Specifically, LaDy first computes generalized coordinates from joint positions and then estimates Lagrangian terms under physical constraints to explicitly synthesize the generalized forces. To further ensure physical coherence, our Energy Consistency Loss enforces the work-energy theorem, aligning kinetic energy change with the work done by the net force. The learned dynamics then drive a Spatio-Temporal Modulation module: Spatially, generalized forces are fused with spatial representations to provide more discriminative semantics. Temporally, salient dynamic signals are constructed for temporal gating, thereby significantly enhancing boundary awareness. Experiments on challenging datasets show that LaDy achieves state-of-the-art performance, validating the integration of physical dynamics for action segmentation. Code is available at https://github.com/HaoyuJi/LaDy.","cvf":"https://openaccess.thecvf.com/content/CVPR2026/html/Ji_LaDy_Lagrangian-Dynamic_Informed_Network_for_Skeleton-based_Action_Segmentation_via_Spatial-Temporal_CVPR_2026_paper.html","pdf":"https://openaccess.thecvf.com/content/CVPR2026/papers/Ji_LaDy_Lagrangian-Dynamic_Informed_Network_for_Skeleton-based_Action_Segmentation_via_Spatial-Temporal_CVPR_2026_paper.pdf","arxiv":"https://arxiv.org/abs/2603.24097"},{"level":"B","directionZh":"4D动态重建","directionEn":"4D dynamic reconstruction","title":"MotionCrafter: Dense Geometry and Motion Reconstruction with a 4D VAE","summaryZh":"MotionCrafter 用 4D VAE 联合表示密集 3D 点图和 3D scene flow，从单目视频重建 4D 几何与密集运动。","summaryEn":"MotionCrafter uses a 4D VAE to jointly reconstruct dense geometry and motion from monocular video.","abstractZh":"MotionCrafter 利用视频生成模型，从单目视频联合重建 4D 几何并估计密集运动。核心表示是在统一坐标系中的密集 3D point maps 与 3D scene flows，并设计专门的 4D VAE 学习该表示。论文指出强行对齐 3D latent 与 RGB VAE latent 没有必要且可能伤害效果，因此提出新的数据归一化与 VAE 训练策略以迁移扩散先验。多数据集实验显示其在几何重建和密集 scene flow 估计上优于现有方法。","abstractEn":"We present MotionCrafter, a framework that leverages video generators to jointly reconstruct 4D geometry and estimate dense motion from a monocular video. The key idea is a joint representation of dense 3D point maps and 3D scene flows in a shared coordinate system, together with a 4D VAE tailored to learn this representation effectively. Unlike prior work that strictly aligns 3D values and latents with RGB VAE latents--despite their fundamentally different distributions--we show that such alignment is unnecessary and can hurt performance. Instead, we propose a new data normalization and VAE training strategy that better transfers diffusion priors and greatly improves reconstruction quality. Extensive experiments on multiple datasets show that MotionCrafter achieves state-of-the-art performance in both geometry reconstruction and dense scene flow estimation, delivering 38.64% and 25.0% improvements in geometry and motion reconstruction, respectiv
